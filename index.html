    document.getElementById('mSub').innerHTML=['',...subs2].map(s=>'<option value="'+U.esc(s)+'">'+U.esc(s)+'</option>').join('');
  });
}
/* modal: valores de um mês (mobile) */
function modalMes(row,mk){
  const m=row.meses[mk]||{p:null,r:null};
  const locked=S.fechados.includes(mk);
  openSheet(U.esc(row.descricao)+' · '+U.mkLabel(mk),
    (locked?'<div class="note warn">Mês fechado — reabra na aba Lançamentos para editar.</div>':'')+
    '<div class="f-grid">'+fMoney('mmP','Previsto',m.p,null,locked?'disabled':'')+fMoney('mmR','Realizado',m.r,null,locked?'disabled':'')+'</div>'+
    '<div class="btn-row" style="margin-top:14px;">'+(locked||IS_SNAPSHOT?'':
    '<button class="btn small" id="mmCopiar">← copiar mês anterior</button>'+
    '<button class="btn small" id="mmRepetir">repetir até dez</button>'+
    '<button class="btn small" id="mmIntervalo">aplicar em intervalo…</button>')+'</div>',
    [{label:'Fechar',fn:closeSheet},...(locked||IS_SNAPSHOT?[]:[{label:'Salvar',cls:'primary',fn:()=>{
      const p=vMoney('mmP'),r=vMoney('mmR');
      closeSheet();
      mudar(()=>{row.meses[mk]={p,r};});
    }}])]);
  if(locked||IS_SNAPSHOT)return;
  document.getElementById('mmCopiar').addEventListener('click',()=>{
    const ant=row.meses[U.mkAdd(mk,-1)]||{p:null,r:null};
    document.getElementById('mmP').value=U.ic(ant.p);
    document.getElementById('mmR').value=U.ic(ant.r);
  });
  document.getElementById('mmRepetir').addEventListener('click',()=>{
    const p=vMoney('mmP'),r=vMoney('mmR');
    const {y,m:mi}=U.mkParse(mk);
    closeSheet();
    mudar(()=>{for(let mm=mi;mm<=12;mm++){const k=U.mk(y,mm);if(S.fechados.includes(k))continue;row.meses[k]={p,r};}});
    toast('Valor aplicado até dezembro');
  });
  document.getElementById('mmIntervalo').addEventListener('click',()=>{
    const p=vMoney('mmP'),r=vMoney('mmR');
    modalIntervalo(row,mk,p,r);
  });
}
function modalIntervalo(row,mkIni,p,r){
  openSheet('Aplicar valor em intervalo',
    '<div class="f-grid">'+
    fSel('itDe','De',listaMkAno(),mkIni)+fSel('itAte','Até',listaMkAno(),U.mk(UI.anoGrid,12))+
    '</div><div class="f-grid" style="margin-top:10px;">'+fMoney('itP','Previsto',p)+fMoney('itR','Realizado',r)+'</div>',
    [{label:'Cancelar',fn:closeSheet},{label:'Aplicar',cls:'primary',fn:()=>{
      const de=vSel('itDe'),ate=vSel('itAte');
      if(U.mkDiff(ate,de)<0){toast('Intervalo inválido',true);return;}
      const p2=vMoney('itP'),r2=vMoney('itR');
      closeSheet();
      mudar(()=>{
        let k=de;
        while(U.mkDiff(k,ate)<=0){if(!S.fechados.includes(k))row.meses[k]={p:p2,r:r2};k=U.mkAdd(k,1);}
      });
      toast('Valores aplicados no intervalo');
    }}]);
}
function listaMkAno(){
  const l=[];
  for(let y=UI.anoGrid-1;y<=UI.anoGrid+1;y++)for(let m=1;m<=12;m++)l.push([U.mk(y,m),U.mkLabel(U.mk(y,m))]);
  return l;
}
/* modal: os 12 meses do ano de uma linha */
function modalMeses(row){
  let html='<div class="twrap"><table class="plain"><thead><tr><th>Mês</th><th>Previsto</th><th>Realizado</th></tr></thead><tbody>';
  for(let m=1;m<=12;m++){
    const mk=U.mk(UI.anoGrid,m),v=row.meses[mk]||{p:null,r:null};
    const locked=S.fechados.includes(mk)||IS_SNAPSHOT;
    html+='<tr><td>'+MESES_ABREV[m-1]+'/'+String(UI.anoGrid).slice(2)+'</td>'+
      '<td><input class="f-input" style="max-width:110px;border:1px solid var(--border);border-radius:3px;padding:6px;" data-mk="'+mk+'" data-c="p" value="'+U.esc(U.ic(v.p))+'" '+(locked?'disabled':'')+'></td>'+
      '<td><input class="f-input" style="max-width:110px;border:1px solid var(--border);border-radius:3px;padding:6px;" data-mk="'+mk+'" data-c="r" value="'+U.esc(U.ic(v.r))+'" '+(locked?'disabled':'')+'></td></tr>';
  }
  html+='</tbody></table></div>';
  openSheet(U.esc(row.descricao)+' · '+UI.anoGrid,html,
    [{label:'Fechar',fn:closeSheet},...(IS_SNAPSHOT?[]:[{label:'Salvar tudo',cls:'primary',fn:()=>{
      const inputs=document.getElementById('sheetBody').querySelectorAll('input[data-mk]');
      const novos={};
      let erro=null;
      inputs.forEach(inp=>{
        if(inp.disabled)return;
        const c=inp.value.trim()===''?null:U.pc(inp.value);
        if(inp.value.trim()!==''&&c==null)erro=inp.value;
        if(!novos[inp.dataset.mk])novos[inp.dataset.mk]={};
        novos[inp.dataset.mk][inp.dataset.c]=c;
      });
      if(erro){toast('Valor inválido: '+erro,true);return;}
      closeSheet();
      mudar(()=>{
        for(const mk in novos){
          if(!row.meses[mk])row.meses[mk]={p:null,r:null};
          Object.assign(row.meses[mk],novos[mk]);
        }
      });
    }}])]);
}

/* ═══════════════════════════════════════════════════════════════
   15 · ABA ORÇAMENTO E METAS
═══════════════════════════════════════════════════════════════ */
function rOrc(el){
  const mk=UI.mk;
  const natO=UI.natSeg==='receita'?'receita':'despesa';
  const prev=FIN.porCategoria(S,natO,mk,'p'),real=FIN.porCategoria(S,natO,mk,'r');
  const cats=[...new Set([...Object.keys(prev),...Object.keys(real)])];
  const linhas=cats.map(c=>{
    const p=prev[c]||0,r=real[c]||0,desvio=r-p;
    const pct=p>0?r/p*100:null;
    return {c,p,r,desvio,pct};
  }).sort((a,b)=>Math.abs(b.desvio)-Math.abs(a.desvio));
  const totP=U.sum(linhas.map(l=>l.p)),totR=U.sum(linhas.map(l=>l.r));
  const maiorDesvio=linhas.filter(l=>natO==='despesa'?l.desvio>0:l.desvio<0).slice(0,2);
  el.innerHTML=
    '<div class="sec-title"><span class="sec-num">01</span> Orçamento de '+U.mkLabelFull(mk)+
    '<span class="sec-right">'+(IS_SNAPSHOT?'':'<button class="mini" id="btnReplicar">replicar previstos →</button>')+'</span></div>'+
    '<div class="seg" style="max-width:340px;margin-bottom:12px;">'+
    '<button class="seg-btn '+(natO==='despesa'?'active':'')+'" data-nat="despesa">Despesas</button>'+
    '<button class="seg-btn '+(natO==='receita'?'active':'')+'" data-nat="receita">Receitas</button></div>'+
    '<div class="note">Orçamento = valores <strong>previstos</strong> dos lançamentos; realizado vem dos valores efetivos. '+
    (natO==='despesa'?'Gastar menos que o orçado é positivo.':'Receber mais que o previsto é positivo.')+'</div>'+
    (maiorDesvio.length?'<div class="note warn"><strong>Maiores desvios:</strong> '+maiorDesvio.map(l=>U.esc(l.c)+' ('+U.fc(l.desvio)+')').join(' · ')+'</div>':'')+
    (linhas.length?'<div id="orcLinhas"></div>':'<div class="empty-state">Sem valores previstos ou realizados neste mês.</div>')+
    '<div class="chip-row"><div class="chip"><span class="chip-label">Total previsto</span><span class="chip-value">'+U.fc(totP)+'</span></div>'+
    '<div class="chip"><span class="chip-label">Total realizado</span><span class="chip-value '+(natO==='despesa'?(totR>totP?'c-rust':'c-sage'):(totR>=totP?'c-sage':'c-rust'))+'">'+U.fc(totR)+'</span></div>'+
    '<div class="chip"><span class="chip-label">Desvio</span><span class="chip-value">'+U.fc(totR-totP)+' ('+(totP>0?U.fpct((totR-totP)/totP*100):'—')+')</span></div></div>'+
    '<div class="sec-title"><span class="sec-num">02</span> Metas'+
    '<span class="sec-right">'+(IS_SNAPSHOT?'':'<button class="mini" id="btnNovaMeta">+ nova meta</button>')+'</span></div>'+
    '<div id="metasList"></div>';
  const cont=document.getElementById('orcLinhas');
  if(cont)linhas.forEach(l=>{
    const pct=l.pct==null?null:l.pct;
    let status='ok';
    if(natO==='despesa'&&pct!=null)status=pct<=S.config.semaforo.amarelo?'ok':(pct<=S.config.semaforo.vermelho?'warn':'bad');
    if(natO==='receita'&&pct!=null)status=pct>=100?'ok':(pct>=80?'warn':'bad');
    const div=document.createElement('div');div.className='rowcard';
    div.innerHTML='<div class="rc-top"><span class="sem '+(status==='ok'?'g':status==='warn'?'y':'r')+'"></span>'+
      '<span class="rc-desc">'+U.esc(l.c)+'</span>'+
      '<span class="rc-val">'+U.fc0(l.r)+' <span class="muted">/ '+U.fc0(l.p)+'</span></span></div>'+
      '<div class="prog" style="margin-top:8px;"><i class="'+(status==='ok'?'':status==='warn'?'warn':'bad')+'" style="width:'+(pct==null?0:U.clamp(pct,0,100))+'%;"></i></div>'+
      '<div class="muted" style="margin-top:4px;">'+(pct==null?'sem orçamento definido':U.fpct(pct,0)+' do previsto · desvio '+U.fc(l.desvio))+'</div>';
    cont.appendChild(div);
  });
  const ml=document.getElementById('metasList');
  const metas=S.metas;
  if(!metas.length)ml.innerHTML='<div class="empty-state">Nenhuma meta criada.</div>';
  metas.forEach(m=>{
    const p=FIN.metaProgresso(S,m,mk);
    const tipoNome=(TIPOS_META.find(t=>t[0]===m.tipo)||['','?'])[1];
    const div=document.createElement('div');div.className='rowcard'+(m.ativo?'':' inactive');
    div.innerHTML='<div class="rc-top"><span class="sem '+(p.status==='ok'?'g':p.status==='warn'?'y':'r')+'"></span>'+
      '<span class="rc-desc">'+U.esc(m.nome)+'</span><span class="rc-cat">'+tipoNome+' · '+m.periodo+(m.periodo==='anual'?' (≈ '+U.fc0(Math.round((m.valorAlvo||0)/12))+'/mês)':'')+'</span>'+
      '<span class="rc-val">'+U.fc0(p.realizado)+' <span class="muted">/ '+U.fc0(p.alvo)+'</span></span></div>'+
      '<div class="prog" style="margin-top:8px;"><i class="'+(p.status==='ok'?'':p.status==='warn'?'warn':'bad')+'" style="width:'+(p.pct==null?0:U.clamp(p.pct,0,100))+'%;"></i></div>'+
      '<div class="rc-actions">'+(IS_SNAPSHOT?'':'<button class="mini" data-a="editar">editar</button>'+
      '<button class="mini" data-a="ativar">'+(m.ativo?'desativar':'ativar')+'</button><button class="mini danger" data-a="excluir">excluir</button>')+'</div>';
    div.querySelectorAll('[data-a]').forEach(b=>b.addEventListener('click',()=>{
      if(b.dataset.a==='editar')modalMeta(m);
      else if(b.dataset.a==='ativar')mudar(()=>{m.ativo=!m.ativo;});
      else confirmar('Excluir a meta <strong>'+U.esc(m.nome)+'</strong>?',()=>mudar(()=>{S.metas=S.metas.filter(x=>x.id!==m.id);}),'Excluir');
    }));
    ml.appendChild(div);
  });
  el.querySelectorAll('[data-nat]').forEach(b=>b.addEventListener('click',()=>{UI.natSeg=b.dataset.nat;rOrc(el);}));
  document.getElementById('btnNovaMeta')?.addEventListener('click',()=>modalMeta(null));
  document.getElementById('btnReplicar')?.addEventListener('click',()=>{
    confirmar('Copiar os valores <strong>previstos</strong> de '+U.mkLabelFull(mk)+' para todos os meses seguintes até dezembro/'+U.mkParse(mk).y+'?',()=>{
      mudar(()=>{
        const {y,m}=U.mkParse(mk);
        for(const r of S.rows){
          const v=(r.meses[mk]||{}).p;
          if(v==null)continue;
          for(let mm=m+1;mm<=12;mm++){
            const k=U.mk(y,mm);
            if(S.fechados.includes(k))continue;
            if(!r.meses[k])r.meses[k]={p:null,r:null};
            r.meses[k].p=v;
          }
        }
      });
      toast('Orçamento replicado até dezembro');
    },'Replicar');
  });
}
function modalMeta(m){
  const isNew=!m;
  openSheet(isNew?'Nova meta':'Editar meta',
    '<div class="f-grid">'+
    fText('gNome','Nome da meta *',m?.nome||'')+
    fSel('gTipo','Tipo',TIPOS_META,m?.tipo||'despesa_max')+
    fSel('gPer','Período',[['mensal','Mensal'],['anual','Anual'],['data','Data-alvo']],m?.periodo||'mensal')+
    fMoney('gAlvo','Valor-alvo *',m?.valorAlvo)+
    fText('gEscopo','Escopo/data (opcional)',m?.escopo||'','Categoria relacionada ou competência AAAA-MM para data-alvo')+
    '</div>',
    [{label:'Cancelar',fn:closeSheet},{label:isNew?'Criar':'Salvar',cls:'primary',fn:()=>{
      const nome=vTxt('gNome'),alvo=vMoney('gAlvo');
      if(!nome){toast('Informe o nome',true);return;}
      if(alvo==null||alvo<=0){toast('Informe um valor-alvo válido',true);return;}
      closeSheet();
      mudar(()=>{
        const dados={nome,tipo:vSel('gTipo'),periodo:vSel('gPer'),valorAlvo:alvo,escopo:vTxt('gEscopo')};
        if(isNew)S.metas.push(Object.assign({id:U.uid(),ativo:true},dados));
        else Object.assign(m,dados);
      });
    }}]);
}

/* ═══════════════════════════════════════════════════════════════
   16 · ABA INVESTIMENTOS
═══════════════════════════════════════════════════════════════ */
function rInv(el){
  const mk=UI.mk;
  const agg=FIN.investMes(S,mk);
  const fin=S.invest.filter(a=>a.ativo&&a.tipoAtivo!=='bem');
  const bens=S.invest.filter(a=>a.ativo&&a.tipoAtivo==='bem');
  const arquiv=S.invest.filter(a=>!a.ativo);
  /* alocação por classe */
  const aloc={};
  fin.forEach(a=>{const s=FIN.saldoAtivoAte(a,mk);if(s>0)aloc[a.classe]=(aloc[a.classe]||0)+s;});
  const alvo=S.config.alocacaoAlvo||{};
  el.innerHTML=
    '<div class="sec-title"><span class="sec-num">01</span> Posição em '+U.mkLabelFull(mk)+
    '<span class="sec-right">'+(IS_SNAPSHOT?'':'<button class="mini" id="btnNovoAtivo">+ ativo</button><button class="mini" id="btnNovoBem">+ bem</button><button class="mini" id="btnAlvo">alocação-alvo</button>')+'</span></div>'+
    '<div class="kpi-grid">'+
    kpiHtml('Patrimônio financeiro',U.fc0(agg.patrFin),'ativos líquidos','k-gold')+
    kpiHtml('Bens (não geram renda)',U.fc0(agg.patrBens),'imóveis, veículos…','k-dark')+
    kpiHtml('Aportes líquidos no mês',U.fc(agg.aportesLiq),'aportes − resgates',agg.aportesLiq>=0?'k-pos':'k-neg')+
    kpiHtml('Rendimentos no mês',U.fc(agg.rend),'valorização informada',agg.rend>=0?'k-pos':'k-neg')+
    '</div>'+
    '<div class="sec-title"><span class="sec-num">02</span> Ativos financeiros</div>'+
    '<div id="invFin"></div>'+
    '<div class="sec-title"><span class="sec-num">03</span> Bens</div>'+
    '<div id="invBens"></div>'+
    (arquiv.length?'<div class="sec-title">Arquivados</div><div id="invArq"></div>':'')+
    '<div class="sec-title"><span class="sec-num">04</span> Alocação por classe</div>'+
    chartCard('chAloc','Alocação atual'+(Object.keys(alvo).length?' × alvo':''))+
    '<div class="note">O saldo de cada mês é o informado por você ou, na ausência, calculado como saldo anterior + aportes − resgates + rendimentos. Bens não entram na renda passiva projetada, salvo conversão definida no simulador.</div>';
  const contF=document.getElementById('invFin');
  if(!fin.length)contF.innerHTML='<div class="empty-state">Nenhum ativo financeiro cadastrado.</div>';
  fin.forEach(a=>contF.appendChild(cardAtivo(a,mk)));
  const contB=document.getElementById('invBens');
  if(!bens.length)contB.innerHTML='<div class="empty-state">Nenhum bem cadastrado.</div>';
  bens.forEach(a=>contB.appendChild(cardAtivo(a,mk)));
  if(arquiv.length){const ca=document.getElementById('invArq');arquiv.forEach(a=>ca.appendChild(cardAtivo(a,mk)));}
  /* donut alocação */
  const itens=Object.entries(aloc).sort((a,b)=>b[1]-a[1]).map(([c,v],i)=>({label:c+(alvo[c]!=null?' (alvo '+alvo[c]+'%)':''),val:v,color:PALETA[i%PALETA.length]}));
  CH.donut(document.getElementById('chAloc'),itens);
  tabelaDados('chAloc',['Classe','Saldo','% atual','% alvo'],
    Object.entries(aloc).map(([c,v])=>[c,v,U.fpct(v/Math.max(1,agg.patrFin)*100,1),alvo[c]!=null?alvo[c]+'%':'—']));
  bindChartExtras(el);
  document.getElementById('btnNovoAtivo')?.addEventListener('click',()=>modalAtivo(null,'financeiro'));
  document.getElementById('btnNovoBem')?.addEventListener('click',()=>modalAtivo(null,'bem'));
  document.getElementById('btnAlvo')?.addEventListener('click',modalAlvo);
}
function cardAtivo(a,mk){
  const s=FIN.saldoAtivoAte(a,mk);
  const m=(a.meses||{})[mk]||{ap:0,res:0,rend:0,saldo:null};
  const div=document.createElement('div');div.className='rowcard'+(a.ativo?'':' inactive');
  div.innerHTML='<div class="rc-top"><span class="rc-desc">'+U.esc(a.nome)+'</span>'+
    '<span class="rc-cat">'+U.esc(a.classe)+(a.instituicao?' · '+U.esc(a.instituicao):'')+(a.liquidez?' · liq. '+U.esc(a.liquidez):'')+'</span>'+
    '<span class="rc-val c-gold">'+U.fc0(s)+'</span></div>'+
    '<div class="chip-row" style="margin:8px 0 0;">'+
    '<div class="chip"><span class="chip-label">Aporte '+U.mkLabel(mk)+'</span><span class="chip-value">'+U.fc(m.ap||0)+'</span></div>'+
    '<div class="chip"><span class="chip-label">Resgate</span><span class="chip-value">'+U.fc(m.res||0)+'</span></div>'+
    '<div class="chip"><span class="chip-label">Rendimento</span><span class="chip-value '+((m.rend||0)>=0?'c-sage':'c-rust')+'">'+U.fc(m.rend||0)+'</span></div>'+
    (m.rend!=null&&s-((m.saldo!=null)?0:(m.ap||0)-(m.res||0)+(m.rend||0))>0?'<div class="chip"><span class="chip-label">Rentab. mês</span><span class="chip-value">'+rentMes(a,mk)+'</span></div>':'')+
    '</div>'+
    '<div class="rc-actions">'+(IS_SNAPSHOT?'':
    '<button class="mini" data-a="lancar">lançar mês</button><button class="mini" data-a="editar">editar</button>'+
    '<button class="mini" data-a="duplicar">duplicar</button><button class="mini" data-a="arquivar">'+(a.ativo?'arquivar':'reativar')+'</button>'+
    '<button class="mini danger" data-a="excluir">excluir</button>')+'</div>';
  div.querySelectorAll('[data-a]').forEach(b=>b.addEventListener('click',()=>{
    const ac=b.dataset.a;
    if(ac==='lancar')modalLancInv(a,mk);
    else if(ac==='editar')modalAtivo(a);
    else if(ac==='duplicar')mudar(()=>{const c=U.deep(a);c.id=U.uid();c.nome=a.nome+' (cópia)';S.invest.push(c);});
    else if(ac==='arquivar')mudar(()=>{a.ativo=!a.ativo;});
    else confirmar('Excluir <strong>'+U.esc(a.nome)+'</strong> e todo o histórico?',()=>mudar(()=>{S.invest=S.invest.filter(x=>x.id!==a.id);}),'Excluir');
  }));
  return div;
}
function rentMes(a,mk){
  const sAnt=FIN.saldoAtivoAte(a,U.mkAdd(mk,-1));
  const m=(a.meses||{})[mk];
  if(!m||!sAnt||sAnt<=0||m.rend==null)return '—';
  return U.fpct(m.rend/sAnt*100,2);
}
function modalLancInv(a,mk){
  const m=(a.meses||{})[mk]||{ap:null,res:null,rend:null,saldo:null};
  openSheet('Lançar '+U.mkLabel(mk)+' · '+U.esc(a.nome),
    '<div class="f-grid">'+
    fMoney('liAp','Aporte no mês',m.ap)+
    fMoney('liRes','Resgate no mês',m.res)+
    fMoney('liRend','Rendimento no mês',m.rend,'Pode ser negativo (ex.: −1.234,56)')+
    fMoney('liSaldo','Saldo final informado (opcional)',m.saldo,'Se vazio, o saldo é calculado automaticamente')+
    '</div>',
    [{label:'Cancelar',fn:closeSheet},{label:'Salvar',cls:'primary',fn:()=>{
      closeSheet();
      mudar(()=>{
        if(!a.meses)a.meses={};
        a.meses[mk]={ap:vMoney('liAp')||0,res:vMoney('liRes')||0,rend:vMoney('liRend')||0,saldo:vMoney('liSaldo')};
      });
    }}]);
}
function modalAtivo(a,tipoNovo){
  const isNew=!a;
  const tipo=a?a.tipoAtivo:(tipoNovo||'financeiro');
  openSheet(isNew?(tipo==='bem'?'Novo bem':'Novo ativo financeiro'):'Editar '+U.esc(a.nome),
    '<div class="f-grid">'+
    fText('aNome','Nome *',a?.nome||'')+
    fSel('aClasse','Classe',tipo==='bem'?[...CLASSES_BEM,'Outros']:CLASSES_INV,a?.classe||(tipo==='bem'?'Imóvel':'Renda fixa'))+
    fText('aInst','Instituição',a?.instituicao||'')+
    fSel('aLiq','Liquidez',['','D+0','D+1','D+30','D+60+','baixa'],a?.liquidez||'')+
    fMoney('aSaldo0','Saldo inicial'+(tipo==='bem'?' / valor de mercado':''),a?.saldoInicial)+
    (tipo==='bem'?fMoney('aRenda','Renda mensal gerada (se houver)',a?.rendaBem,'Ex.: aluguel. Zero = bem não gera renda.'):'')+
    fText('aTags','Tags',(a?.tags||[]).join(', '))+
    '</div>'+
    '<div class="field" style="margin-top:10px;"><label class="f-label" for="aObs">Observações</label><div class="f-wrap"><textarea class="f-area" id="aObs">'+U.esc(a?.obs||'')+'</textarea></div></div>',
    [{label:'Cancelar',fn:closeSheet},{label:isNew?'Adicionar':'Salvar',cls:'primary',fn:()=>{
      const nome=vTxt('aNome');
      if(!nome){toast('Informe o nome',true);return;}
      closeSheet();
      mudar(()=>{
        const dados={nome,classe:vSel('aClasse'),instituicao:vTxt('aInst'),liquidez:vSel('aLiq'),
          saldoInicial:vMoney('aSaldo0')||0,obs:vTxt('aObs'),
          rendaBem:tipo==='bem'?(vMoney('aRenda')||0):0,
          tags:vTxt('aTags')?vTxt('aTags').split(',').map(s=>s.trim()).filter(Boolean):[]};
        if(isNew)S.invest.push(Object.assign({id:U.uid(),tipoAtivo:tipo,ativo:true,meses:{}},dados));
        else Object.assign(a,dados);
      });
    }}]);
}
function modalAlvo(){
  const alvo=S.config.alocacaoAlvo||{};
  openSheet('Alocação-alvo por classe (%)',
    '<div class="f-grid">'+CLASSES_INV.filter(c=>!CLASSES_BEM.includes(c)).map((c,i)=>
      fNum('alvo'+i,c,alvo[c]!=null?alvo[c]:'','%')).join('')+'</div>'+
    '<span class="f-hint">Deixe em branco as classes sem alvo. A soma não precisa fechar 100%.</span>',
    [{label:'Cancelar',fn:closeSheet},{label:'Salvar',cls:'primary',fn:()=>{
      closeSheet();
      mudar(()=>{
        const novo={};
        CLASSES_INV.filter(c=>!CLASSES_BEM.includes(c)).forEach((c,i)=>{
          const v=vNum('alvo'+i);if(v!=null)novo[c]=v;
        });
        S.config.alocacaoAlvo=novo;
      });
    }}]);
}
</script>

<script>

function dadosReais(){
  const mk=UI.mk;
  const agg=FIN.investMes(S,mk);
  const mks=[];for(let i=5;i>=0;i--)mks.push(U.mkAdd(mk,-i));
  const aporteMedio=U.sum(mks.map(k=>FIN.investMes(S,k).aportesLiq))/mks.length;
  return {patrFin:Math.round(agg.patrFin)/100,bens:Math.round(agg.patrBens)/100,aporteMensal:Math.round(aporteMedio)/100};
}

    aporteMensal:(p.aporteMensal||0)+(p.pgblRendaBrutaAnual||0)*(p.pgblPct||0)/100/12})):null;
  const defl=t=>Math.pow(1+sim.inflM,t);
  const extraAporte=sim.mesMeta==null&&isFinite(sim.necessario0)?aporteNecessario(p):null;
  const extraPrazo=sim.mesMeta==null&&isFinite(sim.necessario0)?prazoAdicional(p):null;
  const fRe=v=>'R$ '+Math.round(v).toLocaleString('pt-BR');
  const labelsAno=anos.map(a=>'A'+a.ano);

  el.innerHTML=
    '<div class="sec-title"><span class="sec-num">01</span> Premissas'+

    '<div class="note">Preencha manualmente ou use os dados já registrados (patrimônio, bens e média de aportes líquidos dos últimos 6 meses). Aportes entram no <strong>fim</strong> de cada mês; contribuição PGBL em dezembro; benefício fiscal reinvestido em maio do ano seguinte. Valores exibidos como "reais" estão descontados da inflação informada.</div>'+
    '<div class="f-grid" id="simForm">'+
    fNum('sIdade','Idade atual (opcional)',p.idadeAtual,'anos')+

    fNum('sInfl','Inflação anual',p.inflacaoAa,'% a.a.')+
    fNum('sRedutor','Redutor/tributação sobre rendimentos (opcional)',p.redutorRend,'%')+
    fNum('sHoriz','Horizonte',p.horizonte,'anos')+
    fNum('sRenda','Renda passiva desejada (R$ de hoje)',p.rendaDesejada,'R$/mês')+
    fSel('sRetM','Taxa de retirada informada em',[['aa','% ao ano'],['am','% ao mês']],p.retiradaModo)+
    fNum('sRet','Taxa de retirada sustentável',p.retirada,p.retiradaModo==='am'?'% a.m.':'% a.a.','Ajuda: percentual do patrimônio que pode ser sacado por período sem esgotá-lo')+
    fNum('sMargem','Margem de segurança',p.margemSeg,'%','Aumenta o patrimônio necessário')+
    '</div>'+
    '<div class="sec-title" style="margin-top:16px;">PGBL (opcional)</div>'+
    '<div style="margin-bottom:8px;">'+fCheck('sPgbl','Incluir cenário PGBL',p.pgblIncluir)+'</div>'+
    '<div class="f-grid">'+
    fNum('sPgRenda','Renda bruta anual tributável',p.pgblRendaBrutaAnual,'R$')+

    fNum('sPgAliq','Alíquota marginal estimada',p.pgblAliquota,'%')+
    fNum('sPgAdm','Taxa de administração do PGBL',p.pgblAdmAa,'% a.a.')+
    fNum('sPgRent','Rentabilidade do PGBL',p.pgblRentabAm,'% a.m.')+

    kpiHtml('Total aportado',fRe(sim.aportesAcum),'inclui PGBL e extraordinários','k-dark')+

    chartCard('chSimRenda','Renda passiva projetada × desejada (nominal)')+

    '<div class="twrap"><table class="plain"><thead><tr><th>Ano</th><th>Patrimônio</th><th>Patrimônio real</th><th>Aportes acum.</th><th>Rendimentos acum.</th><th>Renda passiva/mês</th><th>Meta corrigida</th></tr></thead><tbody>'+
    anos.map(a=>{
      const renda=a.total*(sim.retiradaAa/100)/12/(1+(p.margemSeg||0)/100);

    '<div class="sec-title"><span class="sec-num">04</span> Cenários salvos</div>'+
    '<div id="cenList"></div>'+
    (S.cenarios.length>1?'<div class="twrap" style="margin-top:10px;"><table class="plain"><thead><tr><th>Cenário</th><th>Rentab.</th><th>Patrimônio final</th><th>Renda passiva</th><th>% meta</th><th>Meta em</th></tr></thead><tbody>'+
      S.cenarios.map(c=>{
        const r=simular(c.prem);
        return '<tr><td>'+U.esc(c.nome)+'</td><td>'+String(c.prem.rentab).replace('.',',')+(c.prem.rentabModo==='am'?'% a.m.':'% a.a.')+'</td><td class="serif">'+fRe(r.patrFinalNominal)+'</td><td>'+fRe(r.rendaPassivaMes)+'/mês</td><td>'+(r.pctMeta==null?'—':U.fpct(r.pctMeta,0))+'</td><td>'+(r.mesMeta!=null?'ano '+Math.ceil(r.mesMeta/12):'—')+'</td></tr>';

    '<div class="sec-title"><span class="sec-num">05</span> Resumo executivo</div>'+
    '<div class="rowcard" style="font-size:13px;line-height:1.65;">'+resumoExecutivo(sim,p,fRe)+'</div>'+
    '<div class="note"><strong>Premissas e limitações:</strong> projeção determinística mês a mês com taxas constantes definidas por você; rentabilidade passada ou simulada <strong>não garante resultado futuro</strong>; tributação e PGBL são aproximações educativas; bens só entram conforme o percentual de conversão; esta ferramenta não é consultoria financeira.</div>';

  if(idx[idx.length-1]!==sim.nMeses)idx.push(sim.nMeses);

    {label:'Aportes acumulados',color:'#5A7A6A',dash:'5,3',vals:idx.map(t=>cents(sim.serie[t].aportesAcum))},
    {label:'Meta (corrigida)',color:'#C4622D',dash:'2,3',vals:idx.map(t=>isFinite(sim.serie[t].alvo)?cents(sim.serie[t].alvo):null)}
  ],idx.map(t=>'m'+t));
  CH.legenda(document.getElementById('chSimPatrLeg'),[
    {label:'Patrimônio total',color:'#B8944A'},{label:'Aportes acumulados',color:'#5A7A6A'},{label:'Meta (corrigida)',color:'#C4622D'}],()=>rApos(el));
  tabelaDados('chSimPatr',['Mês','Patrimônio','Aportes acum.','Meta'],idx.map(t=>['m'+t,cents(sim.serie[t].total),cents(sim.serie[t].aportesAcum),isFinite(sim.serie[t].alvo)?cents(sim.serie[t].alvo):0]));
  const rendaSerie=idx.map(t=>cents(sim.serie[t].total*(sim.retiradaAa/100)/12/(1+(p.margemSeg||0)/100)));
  CH.line(document.getElementById('chSimRenda'),[

    {label:'Renda desejada (nominal)',color:'#C4622D',dash:'4,3',vals:idx.map(t=>cents((p.rendaDesejada||0)*Math.pow(1+sim.inflM,t)))}
  ],idx.map(t=>'m'+t));
  CH.legenda(document.getElementById('chSimRendaLeg'),[
    {label:'Renda passiva projetada',color:'#5A7A6A'},{label:'Renda desejada (nominal)',color:'#C4622D'}],()=>rApos(el));
  tabelaDados('chSimRenda',['Mês','Renda projetada','Renda desejada'],idx.map((t,i)=>['m'+t,rendaSerie[i],cents((p.rendaDesejada||0)*Math.pow(1+sim.inflM,t))]));
  bindChartExtras(el);
  /* cenários */
  const cl=document.getElementById('cenList');
  if(!S.cenarios.length)cl.innerHTML='<div class="empty-state">Nenhum cenário salvo — ajuste as premissas e salve.</div>';

    const div=document.createElement('div');div.className='rowcard';

      '<div class="rc-actions">'+(IS_SNAPSHOT?'<button class="mini" data-a="aplicar">ver este cenário</button>':

    div.querySelectorAll('[data-a]').forEach(b=>b.addEventListener('click',()=>{
      if(b.dataset.a==='aplicar'){S.config.sim=U.deep(c.prem);if(!IS_SNAPSHOT)Store.save();rApos(el);toast('Cenário aplicado: '+c.nome);}
      else if(b.dataset.a==='duplicar')mudar(()=>{S.cenarios.push({id:U.uid(),nome:c.nome+' (cópia)',prem:U.deep(c.prem)});});
      else confirmar('Excluir o cenário <strong>'+U.esc(c.nome)+'</strong>?',()=>mudar(()=>{S.cenarios=S.cenarios.filter(x=>x.id!==c.id);}),'Excluir');
    }));
    cl.appendChild(div);

  /* eventos premissas */
  const lerPremissas=()=>({
    idadeAtual:vNum('sIdade'),idadeAlvo:vNum('sIdadeAlvo'),
    patrFin:vNum('sPatr')||0,bens:vNum('sBens')||0,convBens:vNum('sConv')||0,
    aporteMensal:vNum('sAporte')||0,aporteExtra:vNum('sExtra')||0,mesExtra:+vSel('sMesExtra'),
    crescAportesAa:vNum('sCresc')||0,rentabModo:vSel('sRentM'),rentab:vNum('sRent')||0,
    inflacaoAa:vNum('sInfl')||0,redutorRend:vNum('sRedutor')||0,horizonte:vNum('sHoriz')||1,
    rendaDesejada:vNum('sRenda')||0,retiradaModo:vSel('sRetM'),retirada:vNum('sRet')||0,margemSeg:vNum('sMargem')||0,
    pgblIncluir:vChk('sPgbl'),pgblRendaBrutaAnual:vNum('sPgRenda')||0,pgblPct:vNum('sPgPct')||0,
    pgblAliquota:vNum('sPgAliq')||0,pgblReinvestir:vChk('sPgReinv'),pgblAdmAa:vNum('sPgAdm')||0,
    pgblRentabAm:vNum('sPgRent')||0,pgblTribResgate:vNum('sPgTrib')||0
  });
  document.getElementById('simAplicar')?.addEventListener('click',()=>{
    S.config.sim=Object.assign(premissasPadrao(),lerPremissas());
    Store.save();rApos(el);toast('Simulação recalculada');
  });
  document.getElementById('simReais')?.addEventListener('click',()=>{
    const d=dadosReais();
    S.config.sim=Object.assign(premissasPadrao(),lerPremissas(),d);
    Store.save();rApos(el);
    toast('Premissas preenchidas com os dados reais');
  });
  document.getElementById('simSalvarCen')?.addEventListener('click',()=>{
    openSheet('Salvar cenário',fText('cenNome','Nome do cenário','Meu cenário'),
      [{label:'Cancelar',fn:closeSheet},{label:'Salvar',cls:'primary',fn:()=>{
        const nome=vTxt('cenNome')||'Cenário';
        closeSheet();
        mudar(()=>{S.cenarios.push({id:U.uid(),nome,prem:Object.assign(premissasPadrao(),lerPremissas())});});
      }}]);
  });
}
function resumoExecutivo(sim,p,fRe){
  const partes=[];
  partes.push('Partindo de '+fRe(p.patrFin)+' em ativos financeiros'+(p.convBens>0?' (+'+p.convBens+'% dos bens)':'')+
    ', com aportes de '+fRe(p.aporteMensal)+'/mês'+(p.aporteExtra?' e '+fRe(p.aporteExtra)+'/ano':'')+
    ' a '+String(p.rentab).replace('.',',')+(p.rentabModo==='am'?'% a.m.':'% a.a.')+
    ', o patrimônio projetado em '+p.horizonte+' anos é de <strong>'+fRe(sim.patrFinalNominal)+'</strong> ('+fRe(sim.patrFinalReal)+' em R$ de hoje).');
  partes.push('Isso sustentaria uma renda passiva de <strong>'+fRe(sim.rendaPassivaMes)+'/mês</strong> à taxa de retirada de '+String(p.retirada).replace('.',',')+(p.retiradaModo==='am'?'% a.m.':'% a.a.')+'.');
  if(isFinite(sim.necessario0)){
    if(sim.jaAtingida)partes.push('A meta de '+fRe(p.rendaDesejada)+'/mês <strong>já está atingida</strong> com o patrimônio atual.');
    else if(sim.mesMeta!=null)partes.push('A meta de '+fRe(p.rendaDesejada)+'/mês é atingida no <strong>mês '+sim.mesMeta+'</strong> (≈ ano '+Math.ceil(sim.mesMeta/12)+' da projeção).');
    else partes.push('A meta de '+fRe(p.rendaDesejada)+'/mês <strong>não é atingida</strong> dentro do horizonte com estas premissas.');
  }else partes.push('Defina uma taxa de retirada maior que zero para calcular o patrimônio necessário.');
  return partes.join(' ');
}

function mksIntervalo(de,ate){
  const l=[];let k=de;
  while(U.mkDiff(k,ate)<=0&&l.length<240){l.push(k);k=U.mkAdd(k,1);}
  return l;
}
function rRel(el){
  const de=UI.rel.de,ate=UI.rel.ate;
  const mks=mksIntervalo(de,ate);
  const catFiltro=UI.rel.categoria;
  const catsD=catsDe('despesa').map(c=>c.n);
  const opcoesMk=[];
  for(let i=-35;i<=12;i++)opcoesMk.push(U.mkAdd(U.mkNow(),i));
  const {y:anoAtu}=U.mkParse(UI.mk);
  /* YTD */
  const mksYtd=[];for(let m=1;m<=U.mkParse(UI.mk).m;m++)mksYtd.push(U.mk(anoAtu,m));
  const recY=U.sum(mksYtd.map(k=>FIN.totalNatureza(S,'receita',k,'r')));
  const despY=U.sum(mksYtd.map(k=>FIN.totalNatureza(S,'despesa',k,'r')));

    '<div class="sec-title"><span class="sec-num">01</span> Filtros</div>'+

    '<div class="f-wrap"><span class="f-unit">de</span><select class="f-select" id="relDe" aria-label="Período inicial">'+opcoesMk.map(k=>'<option value="'+k+'"'+(k===de?' selected':'')+'>'+U.mkLabel(k)+'</option>').join('')+'</select></div>'+
    '<div class="f-wrap"><span class="f-unit">até</span><select class="f-select" id="relAte" aria-label="Período final">'+opcoesMk.map(k=>'<option value="'+k+'"'+(k===ate?' selected':'')+'>'+U.mkLabel(k)+'</option>').join('')+'</select></div>'+
    '<div class="f-wrap"><select class="f-select" id="relCat" aria-label="Categoria de despesa"><option value="">todas as categorias</option>'+catsD.map(c=>'<option value="'+U.esc(c)+'"'+(c===catFiltro?' selected':'')+'>'+U.esc(c)+'</option>').join('')+'</select></div>'+
    '<button class="mini" id="relPrint">🖨 imprimir/PDF</button>'+
    '</div>'+
    '<div class="chip-row"><div class="chip"><span class="chip-label">Receitas YTD '+anoAtu+'</span><span class="chip-value c-sage">'+U.fc0(recY)+'</span></div>'+
    '<div class="chip"><span class="chip-label">Despesas YTD</span><span class="chip-value c-rust">'+U.fc0(despY)+'</span></div>'+
    '<div class="chip"><span class="chip-label">Resultado YTD</span><span class="chip-value">'+U.fc0(recY-despY)+'</span></div>'+
    '<div class="chip"><span class="chip-label">Aportes líq. YTD</span><span class="chip-value c-gold">'+U.fc0(apY)+'</span></div></div>'+
    chartCard('chRel1','Evolução mensal — receitas × despesas × resultado')+
    chartCard('chRel2','Despesas por categoria ao longo do tempo')+
    chartCard('chRel3','Composição das despesas no período')+
    chartCard('chRel4','Previsto × realizado (despesas)')+
    chartCard('chRel5','Evolução do patrimônio')+
    chartCard('chRel6','Aportes × rendimentos')+
    chartCard('chRel7','Metas × realizado (mês atual)')+
    '<div class="sec-title"><span class="sec-num">02</span> Ranking de despesas no período'+(catFiltro?' · '+U.esc(catFiltro):'')+'</div>'+
    '<div id="relRank"></div>';
  const lbl=mks.map(U.mkLabel);
  const recS=mks.map(k=>FIN.totalNatureza(S,'receita',k,'r'));
  const despS=mks.map(k=>catFiltro?(FIN.porCategoria(S,'despesa',k,'r')[catFiltro]||0):FIN.totalNatureza(S,'despesa',k,'r'));
  CH.line(document.getElementById('chRel1'),[
    {label:'Receitas',color:'#5A7A6A',vals:recS},
    {label:'Despesas'+(catFiltro?' ('+catFiltro+')':''),color:'#C4622D',vals:despS},
    {label:'Resultado',color:'#B8944A',dash:'5,3',vals:mks.map((k,i)=>recS[i]-despS[i])}
  ],lbl);
  CH.legenda(document.getElementById('chRel1Leg'),[{label:'Receitas',color:'#5A7A6A'},{label:'Despesas'+(catFiltro?' ('+catFiltro+')':''),color:'#C4622D'},{label:'Resultado',color:'#B8944A'}],()=>rRel(el));
  tabelaDados('chRel1',['Mês','Receitas','Despesas','Resultado'],mks.map((k,i)=>[U.mkLabel(k),recS[i],despS[i],recS[i]-despS[i]]));
  /* stacked por categoria: top 5 + Outros */
  const totPorCat={};
  mks.forEach(k=>{const m=FIN.porCategoria(S,'despesa',k,'r');for(const c in m)totPorCat[c]=(totPorCat[c]||0)+m[c];});
  const topCats=Object.entries(totPorCat).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([c])=>c);
  const seriesCat=topCats.map((c,i)=>({label:c,color:PALETA[i%PALETA.length],vals:mks.map(k=>FIN.porCategoria(S,'despesa',k,'r')[c]||0)}));
  seriesCat.push({label:'Outros',color:'#8C8578',vals:mks.map(k=>{
    const m=FIN.porCategoria(S,'despesa',k,'r');let t=0;for(const c in m)if(!topCats.includes(c))t+=m[c];return t;})});
  CH.bar(document.getElementById('chRel2'),seriesCat,lbl,{stack:true});
  CH.legenda(document.getElementById('chRel2Leg'),seriesCat,()=>rRel(el));
  tabelaDados('chRel2',['Mês',...seriesCat.map(s=>s.label)],mks.map((k,i)=>[U.mkLabel(k),...seriesCat.map(s=>s.vals[i])]));

  const compItems=Object.entries(totPorCat).sort((a,b)=>b[1]-a[1]);

  /* previsto x realizado */
  const prevS=mks.map(k=>catFiltro?(FIN.porCategoria(S,'despesa',k,'p')[catFiltro]||0):FIN.totalNatureza(S,'despesa',k,'p'));
  CH.bar(document.getElementById('chRel4'),[
    {label:'Previsto',color:'#8C8578',vals:prevS},{label:'Realizado',color:'#C4622D',vals:despS}],lbl,{});

  /* patrimônio */
  const pfS=mks.map(k=>FIN.investMes(S,k).patrFin),ptS=mks.map(k=>FIN.investMes(S,k).patrTotal);

    {label:'Financeiro',color:'#B8944A',vals:pfS},{label:'Total (com bens)',color:'#1C1C1E',dash:'5,3',vals:ptS}],lbl);

  tabelaDados('chRel5',['Mês','Financeiro','Total'],mks.map((k,i)=>[U.mkLabel(k),pfS[i],ptS[i]]));
  /* aportes x rendimentos */
  const apS=mks.map(k=>FIN.investMes(S,k).aportesLiq),rdS=mks.map(k=>FIN.investMes(S,k).rend);
  CH.bar(document.getElementById('chRel6'),[
    {label:'Aportes líquidos',color:'#B8944A',vals:apS},{label:'Rendimentos',color:'#5A7A6A',vals:rdS}],lbl,{});
  CH.legenda(document.getElementById('chRel6Leg'),[{label:'Aportes líquidos',color:'#B8944A'},{label:'Rendimentos',color:'#5A7A6A'}],()=>rRel(el));
  tabelaDados('chRel6',['Mês','Aportes líq.','Rendimentos'],mks.map((k,i)=>[U.mkLabel(k),apS[i],rdS[i]]));
  /* metas */
  const metasAtivas=S.metas.filter(m=>m.ativo);
  CH.bar(document.getElementById('chRel7'),[
    {label:'Alvo',color:'#8C8578',vals:metasAtivas.map(m=>m.valorAlvo||0)},
    {label:'Realizado',color:'#B8944A',vals:metasAtivas.map(m=>FIN.metaProgresso(S,m,UI.mk).realizado)}],
    metasAtivas.map(m=>m.nome.length>10?m.nome.slice(0,9)+'…':m.nome),{});
  CH.legenda(document.getElementById('chRel7Leg'),[{label:'Alvo',color:'#8C8578'},{label:'Realizado',color:'#B8944A'}],()=>rRel(el));
  tabelaDados('chRel7',['Meta','Alvo','Realizado'],metasAtivas.map(m=>[m.nome,m.valorAlvo||0,FIN.metaProgresso(S,m,UI.mk).realizado]));
  /* ranking */
  const rank=[];
  S.rows.filter(r=>r.ativo&&r.natureza==='despesa'&&(!catFiltro||r.categoria===catFiltro)).forEach(r=>{
    const t=U.sum(mks.map(k=>FIN.valorMes(r,k,'r')));
    if(t>0)rank.push([r.descricao+' · '+r.categoria,t]);
  });
  rank.sort((a,b)=>b[1]-a[1]);
  const totRank=U.sum(rank.map(r=>r[1]));
  document.getElementById('relRank').innerHTML=rank.length?
    '<div class="twrap"><table class="plain"><thead><tr><th>#</th><th>Despesa</th><th>Total no período</th><th>% do total</th></tr></thead><tbody>'+

function lerCompetencia(v){
  if(v==null||v==='')return null;
  if(typeof v==='number')return U.excelSerialToMk(v);
  const s=String(v).trim();
  if(U.mkValid(s))return s;
  const m=s.match(/^(\d{1,2})[\/\-](\d{4})$/);
  if(m)return U.mk(+m[2],+m[1]);
  return undefined; /* inválida */
}
function importarExcel(file){
  file.arrayBuffer().then(buf=>XL.read(buf)).then(sheets=>{
    const byName={};sheets.forEach(s=>byName[s.name.toLowerCase()]=s.aoa);
    const erros=[];const stats={novos:0,atualizados:0,ignorados:0,erros:0};
    const lancAoa=byName['lancamentos'],invAoa=byName['investimentos'],metasAoa=byName['metas'],catsAoa=byName['categorias'];
    if(!lancAoa&&!invAoa&&!metasAoa){
      toast('Nenhuma aba reconhecida (Lancamentos/Investimentos/Metas)',true);return;
    }
    const parse=(aoa,cols,abaNome,cb)=>{
      if(!aoa||aoa.length<2)return;
      const head=(aoa[0]||[]).map(h=>String(h||'').trim().toLowerCase());
      const idx={};cols.forEach(c=>idx[c]=head.indexOf(c));
      if(idx[cols[1]]<0){erros.push({aba:abaNome,linha:1,coluna:cols[1],valor:'',msg:'Cabeçalho não encontrado — use o modelo'});return;}
      for(let i=1;i<aoa.length;i++){
        const row=aoa[i]||[];
        if(row.every(c=>c==null||c===''))continue;
        const get=c=>idx[c]>=0?row[idx[c]]:'';
        cb(get,i+1);
      }
    };
    /* lançamentos */
    const novosRows={};
    parse(lancAoa,COLS_LANC,'Lancamentos',(get,ln)=>{
      const tipo=String(get('tipo')||'').toLowerCase().trim();
      if(tipo!=='receita'&&tipo!=='despesa'){stats.erros++;erros.push({aba:'Lancamentos',linha:ln,coluna:'tipo',valor:get('tipo'),msg:'use receita ou despesa'});return;}
      const desc=String(get('descricao')||'').trim();
      if(!desc){stats.erros++;erros.push({aba:'Lancamentos',linha:ln,coluna:'descricao',valor:'',msg:'descrição vazia'});return;}
      const comp=lerCompetencia(get('competencia'));
      if(comp===undefined){stats.erros++;erros.push({aba:'Lancamentos',linha:ln,coluna:'competencia',valor:get('competencia'),msg:'use AAAA-MM'});return;}
      const vp=get('valor_previsto')===''?null:U.pc(get('valor_previsto'));
      const vr=get('valor_realizado')===''?null:U.pc(get('valor_realizado'));
      if(get('valor_previsto')!==''&&get('valor_previsto')!=null&&vp==null){stats.erros++;erros.push({aba:'Lancamentos',linha:ln,coluna:'valor_previsto',valor:get('valor_previsto'),msg:'número inválido'});return;}
      if(get('valor_realizado')!==''&&get('valor_realizado')!=null&&vr==null){stats.erros++;erros.push({aba:'Lancamentos',linha:ln,coluna:'valor_realizado',valor:get('valor_realizado'),msg:'número inválido'});return;}
      const key=String(get('id')||'').trim()||(tipo+'::'+desc.toLowerCase());
      if(!novosRows[key])novosRows[key]={id:String(get('id')||'').trim()||U.uid(),natureza:tipo,descricao:desc,
        categoria:String(get('categoria')||'').trim()||'Outros',subcategoria:String(get('subcategoria')||'').trim(),
        classificacao:String(get('classificacao')||'').trim(),essencial:String(get('essencial')||'').toLowerCase()==='sim',
        recorrencia:String(get('recorrencia')||'recorrente').trim()||'recorrente',
        formaPagamento:String(get('forma_pagamento')||'').trim(),conta:String(get('conta')||'').trim(),
        pessoa:String(get('responsavel')||'').trim(),tags:String(get('tags')||'').split(';').map(s=>s.trim()).filter(Boolean),
        obs:String(get('observacoes')||'').trim(),ativo:String(get('ativo')||'sim').toLowerCase()!=='nao',meses:{}};
      if(comp)novosRows[key].meses[comp]={p:vp,r:vr};
    });
    /* investimentos */
    const novosInv={};
    parse(invAoa,COLS_INV,'Investimentos',(get,ln)=>{
      const nome=String(get('nome')||'').trim();
      if(!nome){stats.erros++;erros.push({aba:'Investimentos',linha:ln,coluna:'nome',valor:'',msg:'nome vazio'});return;}
      const comp=lerCompetencia(get('competencia'));
      if(comp===undefined){stats.erros++;erros.push({aba:'Investimentos',linha:ln,coluna:'competencia',valor:get('competencia'),msg:'use AAAA-MM'});return;}
      const key=String(get('id')||'').trim()||('inv::'+nome.toLowerCase());
      if(!novosInv[key])novosInv[key]={id:String(get('id')||'').trim()||U.uid(),nome,
        classe:String(get('classe')||'Outros').trim(),instituicao:String(get('instituicao')||'').trim(),
        liquidez:String(get('liquidez')||'').trim(),tipoAtivo:String(get('tipo_ativo')||'financeiro').toLowerCase()==='bem'?'bem':'financeiro',
        saldoInicial:U.pc(get('saldo_inicial'))||0,rendaBem:U.pc(get('renda_bem'))||0,
        tags:String(get('tags')||'').split(';').map(s=>s.trim()).filter(Boolean),
        obs:String(get('observacoes')||'').trim(),ativo:String(get('ativo')||'sim').toLowerCase()!=='nao',meses:{}};
      if(comp)novosInv[key].meses[comp]={ap:U.pc(get('aporte'))||0,res:U.pc(get('resgate'))||0,
        rend:U.pc(get('rendimento'))||0,saldo:get('saldo_final')===''||get('saldo_final')==null?null:U.pc(get('saldo_final'))};
    });
    /* metas */
    const novasMetas=[];
    parse(metasAoa,COLS_METAS,'Metas',(get,ln)=>{
      const nome=String(get('nome')||'').trim();
      if(!nome)return;
      const alvo=U.pc(get('valor_alvo'));
      if(alvo==null){stats.erros++;erros.push({aba:'Metas',linha:ln,coluna:'valor_alvo',valor:get('valor_alvo'),msg:'número inválido'});return;}
      novasMetas.push({id:String(get('id')||'').trim()||U.uid(),nome,tipo:String(get('tipo')||'despesa_max').trim(),
        periodo:String(get('periodo')||'mensal').trim(),valorAlvo:alvo,escopo:String(get('escopo')||'').trim(),
        ativo:String(get('ativo')||'sim').toLowerCase()!=='nao'});
    });
    /* categorias */
    const novasCats=[];
    parse(catsAoa,['natureza','categoria','subcategorias'],'Categorias',(get)=>{
      const nat=String(get('natureza')||'').toLowerCase().trim(),cat=String(get('categoria')||'').trim();
      if((nat==='receita'||nat==='despesa')&&cat)novasCats.push({nat,cat,subs:String(get('subcategorias')||'').split(';').map(s=>s.trim()).filter(Boolean)});
    });
    const listaRows=Object.values(novosRows),listaInv=Object.values(novosInv);
    /* duplicidades vs base */
    const dupes=listaRows.filter(nr=>S.rows.some(r=>r.id===nr.id||(r.natureza===nr.natureza&&r.descricao.toLowerCase()===nr.descricao.toLowerCase())));
    previewImport({listaRows,listaInv,novasMetas,novasCats,erros,stats,dupes,arquivo:file.name});
  }).catch(e=>{
    console.error(e);
    toast('Falha ao ler o arquivo: '+e.message,true);
  });
}
function previewImport(data){
  const {listaRows,listaInv,novasMetas,novasCats,erros,dupes}=data;
  const totErros=erros.length;
  openSheet('Prévia da importação',
    '<div class="chip-row">'+
    '<div class="chip"><span class="chip-label">Lançamentos</span><span class="chip-value">'+listaRows.length+'</span></div>'+
    '<div class="chip"><span class="chip-label">Investimentos</span><span class="chip-value">'+listaInv.length+'</span></div>'+
    '<div class="chip"><span class="chip-label">Metas</span><span class="chip-value">'+novasMetas.length+'</span></div>'+
    '<div class="chip"><span class="chip-label">Linhas com erro</span><span class="chip-value '+(totErros?'c-rust':'c-sage')+'">'+totErros+'</span></div></div>'+
    (dupes.length?'<div class="note warn"><strong>'+dupes.length+' possível(is) duplicidade(s)</strong> com a base atual (mesmo id ou descrição). No modo "mesclar" os meses importados sobrescrevem os meses iguais desses itens.</div>':'')+
    (totErros?'<div class="note warn"><strong>Erros encontrados (não serão importados):</strong><br>'+
      erros.slice(0,8).map(e=>e.aba+' linha '+e.linha+', '+e.coluna+': "'+U.esc(String(e.valor))+'" — '+e.msg).join('<br>')+
      (erros.length>8?'<br>… e mais '+(erros.length-8):'')+'<br><button class="mini" id="dlErros" style="margin-top:6px;">baixar relatório de erros</button></div>':'')+
    '<div class="field" style="margin-top:12px;"><label class="f-label">Como aplicar</label>'+
    '<div class="f-wrap"><select class="f-select" id="impModo">'+
    '<option value="mesclar">Mesclar — atualiza itens iguais e adiciona novos</option>'+
    '<option value="atualizar">Atualizar por ID — só sobrescreve itens com mesmo id</option>'+
    '<option value="substituir">Substituir a base — apaga tudo e importa</option>'+
    '</select></div></div>'+
    (totErros&&!listaRows.length&&!listaInv.length&&!novasMetas.length?'<div class="note warn">Nada válido para importar.</div>':''),
    [{label:'Cancelar',fn:closeSheet},{label:'Importar',cls:'primary',fn:()=>{
      const modo=vSel('impModo');
      closeSheet();
      aplicarImport(data,modo);
    }}]);
  document.getElementById('dlErros')?.addEventListener('click',()=>{
    const txt='aba;linha;coluna;valor;correcao_sugerida\n'+erros.map(e=>[e.aba,e.linha,e.coluna,String(e.valor).replace(/;/g,','),e.msg].join(';')).join('\n');
    U.download(new Blob([txt],{type:'text/csv;charset=utf-8'}),'erros_importacao.csv');
  });
}
function aplicarImport(data,modo){
  const {listaRows,listaInv,novasMetas,novasCats}=data;
  let novos=0,atualizados=0,ignorados=0;
  mudar(()=>{
    if(modo==='substituir'){S.rows=[];S.invest=[];S.metas=[];}
    const mergeMeses=(dest,src)=>{for(const mk in src)dest[mk]=src[mk];};
    listaRows.forEach(nr=>{
      const ex=S.rows.find(r=>r.id===nr.id)||(modo==='mesclar'?S.rows.find(r=>r.natureza===nr.natureza&&r.descricao.toLowerCase()===nr.descricao.toLowerCase()):null);
      if(ex){if(modo==='atualizar'||modo==='mesclar'){mergeMeses(ex.meses,nr.meses);['categoria','subcategoria','classificacao','pessoa','conta','recorrencia'].forEach(k=>{if(nr[k])ex[k]=nr[k];});atualizados++;}else ignorados++;}
      else if(modo!=='atualizar'){S.rows.push(nr);novos++;}
      else ignorados++;
    });
    listaInv.forEach(na=>{
      const ex=S.invest.find(a=>a.id===na.id)||(modo==='mesclar'?S.invest.find(a=>a.nome.toLowerCase()===na.nome.toLowerCase()):null);
      if(ex){if(modo==='atualizar'||modo==='mesclar'){mergeMeses(ex.meses,na.meses);if(na.saldoInicial)ex.saldoInicial=na.saldoInicial;atualizados++;}else ignorados++;}
      else if(modo!=='atualizar'){S.invest.push(na);novos++;}
      else ignorados++;
    });
    novasMetas.forEach(nm=>{
      const ex=S.metas.find(m=>m.id===nm.id);
      if(ex){Object.assign(ex,nm);atualizados++;}
      else{S.metas.push(nm);novos++;}
    });
    novasCats.forEach(({nat,cat,subs})=>{
      const lista=nat==='receita'?S.config.catsReceita:S.config.catsDespesa;
      let c=lista.find(x=>x.n===cat);
      if(!c){lista.push({n:cat,subs});}
      else subs.forEach(s=>{if(!c.subs.includes(s))c.subs.push(s);});
    });
  });
  toast('Importado: '+novos+' novo(s), '+atualizados+' atualizado(s), '+ignorados+' ignorado(s)');
}

    '<div class="sec-title"><span class="sec-num">01</span> Excel</div>'+

  document.getElementById('dLimpar').addEventListener('click',()=>{

      confirmar('Última confirmação: apagar tudo mesmo?',()=>{
        S=novoEstado();
        try{localStorage.removeItem(LS_KEY);}catch(e){}
        Store.save();renderAll();toast('Base zerada');
      },'Apagar tudo');
    },'Continuar');
  });
  if(location.search.includes('diag')){
    const box=document.getElementById('diagBox');
    box.innerHTML='<div class="sec-title">Diagnóstico</div><div class="diag">executando testes…</div>';
    rodarTestes().then(res=>{
      const ok=res.filter(r=>r.ok).length;
      box.querySelector('.diag').innerHTML='<strong>'+ok+'/'+res.length+' testes aprovados</strong><br>'+
        res.map(r=>'<span class="'+(r.ok?'ok':'fail')+'">'+(r.ok?'✓':'✗')+' '+U.esc(r.nome)+(r.erro?' — '+U.esc(r.erro):'')+'</span>').join('<br>');
    });
  }
}
function modalCats(){
  const render=()=>{
    let html='';
    [['receita','catsReceita'],['despesa','catsDespesa']].forEach(([nat,key])=>{
      html+='<div class="sec-title" style="margin-top:10px;">'+(nat==='receita'?'Receitas':'Despesas')+'</div>';
      S.config[key].forEach((c,i)=>{
        html+='<div class="rowcard" style="padding:9px 12px;"><div class="rc-top"><span class="rc-desc" style="font-size:13px;">'+U.esc(c.n)+'</span>'+
        '<span class="rc-cat">'+(c.subs||[]).map(s=>U.esc(s)).join(' · ')+'</span>'+
        '<button class="mini danger" data-del="'+key+':'+i+'" style="margin-left:auto;">remover</button></div></div>';
      });
      html+='<div class="btn-row"><button class="btn small" data-add="'+key+'">+ categoria de '+nat+'</button></div>';
    });
    document.getElementById('sheetBody').innerHTML=html+
      '<div class="note">Categorias excluídas não apagam o histórico dos lançamentos — eles continuam com o nome antigo.</div>';
    document.getElementById('sheetBody').querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>{
      const [key,i]=b.dataset.del.split(':');
      mudar(()=>S.config[key].splice(+i,1));render();
    }));
    document.getElementById('sheetBody').querySelectorAll('[data-add]').forEach(b=>b.addEventListener('click',()=>{
      const nome=prompt('Nome da nova categoria:');
      if(!nome)return;
      const subs=prompt('Subcategorias (separadas por vírgula, opcional):')||'';
      mudar(()=>S.config[b.dataset.add].push({n:nome.trim(),subs:subs.split(',').map(s=>s.trim()).filter(Boolean)}));
      render();
    }));
  };
  openSheet('Categorias e subcategorias','',[{label:'Fechar',cls:'primary',fn:closeSheet}]);
  render();
}
function modalListaSimples(titulo,key){
  const render=()=>{
    document.getElementById('sheetBody').innerHTML=
      (S.config[key].length?S.config[key].map((v,i)=>'<div class="rowcard" style="padding:9px 12px;"><div class="rc-top"><span class="rc-desc" style="font-size:13px;">'+U.esc(v)+'</span>'+
      '<button class="mini danger" data-del="'+i+'" style="margin-left:auto;">remover</button></div></div>').join(''):'<div class="empty-state">Lista vazia.</div>')+
      '<div class="btn-row"><button class="btn small" id="lsAdd">+ adicionar</button></div>';
    document.getElementById('sheetBody').querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>{
      mudar(()=>S.config[key].splice(+b.dataset.del,1));render();
    }));
    document.getElementById('lsAdd').addEventListener('click',()=>{
      const v=prompt('Novo item:');
      if(v)mudar(()=>S.config[key].push(v.trim()));
      render();
    });
  };
  openSheet(titulo,'',[{label:'Fechar',cls:'primary',fn:closeSheet}]);
  render();
}
function modalSemaforo(){
  openSheet('Limites do semáforo de orçamento',
    '<div class="f-grid">'+
    fNum('semA','Amarelo a partir de',S.config.semaforo.amarelo,'% do orçado','Abaixo disso fica verde')+
    fNum('semV','Vermelho a partir de',S.config.semaforo.vermelho,'% do orçado')+
    '</div>',
    [{label:'Cancelar',fn:closeSheet},{label:'Salvar',cls:'primary',fn:()=>{
      const a=vNum('semA'),v=vNum('semV');
      if(a==null||v==null||a>=v){toast('Amarelo deve ser menor que vermelho',true);return;}
      closeSheet();
      mudar(()=>{S.config.semaforo={amarelo:a,vermelho:v};});
    }}]);
}

  SRC_HTML='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
  const carregado=Store.load();
  S=carregado||novoEstado();
  if(S.config.tema==='escuro')document.documentElement.setAttribute('data-theme','dark');

  document.getElementById('pbNext').addEventListener('click',()=>{UI.mk=U.mkAdd(UI.mk,1);UI.anoGrid=U.mkParse(UI.mk).y;renderAll();});

<script>
'use strict';
/* ═══════════════════════════════════════════════════════════════
   23 · SINCRONIZAÇÃO EM NUVEM (SUPABASE) — módulo opcional
   Só ativa se config.js definir window.GFP_SUPABASE_CONFIG.enabled=true.
   Sem config.js (ou enabled:false), o app funciona 100% como antes,
   só no localStorage deste aparelho — nada aqui muda esse comportamento.
   Estratégia: 1 linha por usuário (tabela app_state) com o estado
   inteiro em JSONB. "Último a salvar vence" comparando updated_at;
   se nuvem e aparelho mudaram desde o último sync, marca conflito
   e deixa o usuário escolher (não sobrescreve nada sozinho).
═══════════════════════════════════════════════════════════════ */
const CloudSync={
  cfg:(window.GFP_SUPABASE_CONFIG||{enabled:false}),
  client:null, session:null, status:'sem configuração', conflict:null, _t:null,
  async ensureLib(){
    if(window.supabase)return true;
    if(!this.cfg.url||!this.cfg.anonKey)return false;
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
      s.onload=res;s.onerror=()=>rej(new Error('CDN indisponível'));
      document.head.appendChild(s);
    });
    return !!window.supabase;
  },
  async init(){
    if(!this.cfg.enabled||IS_SNAPSHOT){this.status='sem configuração';return;}
    let ok=false;
    try{ok=await this.ensureLib();}catch(e){this.status='erro ao carregar biblioteca ('+e.message+')';return;}
    if(!ok){this.status='configuração incompleta (URL/chave)';return;}
    try{
      this.client=window.supabase.createClient(this.cfg.url,this.cfg.anonKey);
    }catch(e){this.status='erro ao iniciar cliente: '+e.message;return;}
    const {data:{session}={session:null}}=await this.client.auth.getSession().catch(()=>({data:{session:null}}));
    this.session=session;
    this.status=session?'conectado':'desconectado';
    this.client.auth.onAuthStateChange((event,sess)=>{
      const antes=!!this.session;
      this.session=sess;
      if(location.hash.includes('access_token'))history.replaceState(null,'',location.pathname+location.search);
      if(sess&&!antes){toast('Login realizado');this.pullAndMerge();}
      if(!sess&&antes){this.status='desconectado';}
      if(UI&&UI.tab==='dados')rDados(document.getElementById('page-dados'));
    });
    if(session)await this.pullAndMerge();
    if(UI&&UI.tab==='dados')rDados(document.getElementById('page-dados'));
  },
  async signIn(email){
    if(!this.client)return;
    this.status='enviando link…';
    const {error}=await this.client.auth.signInWithOtp({email,options:{emailRedirectTo:location.origin+location.pathname}});
    if(error){this.status='erro: '+error.message;toast('Erro ao enviar link: '+error.message,true);}
    else{this.status='link enviado';toast('Link de acesso enviado para '+email+' — confira o e-mail (e o spam)');}
    if(UI&&UI.tab==='dados')rDados(document.getElementById('page-dados'));
  },
  async signOut(){
    if(!this.client)return;
    await this.client.auth.signOut();
    this.session=null;this.status='desconectado';
    if(UI&&UI.tab==='dados')rDados(document.getElementById('page-dados'));
  },
  async pullAndMerge(){
    if(!this.session)return;
    this.status='sincronizando';
    const {data,error}=await this.client.from('app_state').select('data,updated_at').eq('user_id',this.session.user.id).maybeSingle();
    if(error){this.status='erro: '+error.message;toast('Erro ao buscar dados na nuvem: '+error.message,true);return;}
    if(!data){await this.push(true);this.status='sincronizado';return;}
    const remoteTime=new Date(data.updated_at).getTime();
    const localTime=S.ultimaAlteracao?new Date(S.ultimaAlteracao).getTime():0;
    if(JSON.stringify(data.data)===JSON.stringify(S)){this.status='sincronizado';return;}
    if(localTime===0){
      S=migrar(U.deep(data.data));
      try{localStorage.setItem(LS_KEY,JSON.stringify(S));}catch(e){}
      renderAll();this.status='sincronizado';
      toast('Dados carregados da nuvem');
    }else if(remoteTime>localTime){
      this.conflict={remoteAt:data.updated_at,remoteData:data.data};
      this.status='conflito';
      toast('Há uma versão mais recente na nuvem — veja Dados › Nuvem',true);
    }else{
      await this.push();this.status='sincronizado';
    }
  },
  async push(silent){
    if(!this.client||!this.session)return;
    if(!silent)this.status='sincronizando';
    const {error}=await this.client.from('app_state').upsert({user_id:this.session.user.id,data:S,updated_at:new Date().toISOString()});
    if(error){this.status='erro: '+error.message;if(!silent)toast('Erro ao sincronizar: '+error.message,true);return;}
    this.status='sincronizado';
    if(!silent){toast('Sincronizado com a nuvem');if(UI&&UI.tab==='dados')rDados(document.getElementById('page-dados'));}
  },
  schedulePush(){
    if(!this.cfg.enabled||!this.session)return;
    clearTimeout(this._t);
    this._t=setTimeout(()=>this.push(true),2500);
  },
  resolverConflito(usarNuvem){
    if(!this.conflict)return;
    if(usarNuvem){
      S=migrar(U.deep(this.conflict.remoteData));
      try{localStorage.setItem(LS_KEY,JSON.stringify(S));}catch(e){}
      this.conflict=null;this.status='sincronizado';
      renderAll();toast('Versão da nuvem aplicada neste aparelho');
    }else{
      this.conflict=null;
      this.push().then(()=>{if(UI&&UI.tab==='dados')rDados(document.getElementById('page-dados'));});
      toast('Mantendo dados deste aparelho e enviando para a nuvem');
    }
  },
  renderPanel(el){
    let box=el.querySelector('#cloudPanel');
    if(!box){
      box=document.createElement('div');box.id='cloudPanel';
      el.insertBefore(box,el.querySelector('#diagBox')||null);
    }
    if(!this.cfg.enabled){
      box.innerHTML='<div class="sec-title"><span class="sec-num">06</span> Nuvem</div>'+
        '<div class="note">Sincronização em nuvem não configurada. Edite o arquivo <strong>config.js</strong> (na mesma pasta deste app) com a URL e a chave do seu projeto Supabase para ativar o acesso de qualquer lugar.</div>';
      return;
    }
    const badge=this.status==='sincronizado'?'b-ok':this.status==='conectado'||this.status==='desconectado'?'b-mut':this.status==='conflito'?'b-warn':'b-bad';
    let html='<div class="sec-title"><span class="sec-num">06</span> Nuvem <span class="sec-right"><span class="badge '+badge+'">'+U.esc(this.status)+'</span></span></div>';
    if(this.conflict){
      html+='<div class="note warn">Encontramos uma versão mais recente na nuvem (de '+new Date(this.conflict.remoteAt).toLocaleString('pt-BR')+'). Escolha o que fazer — nada será sobrescrito automaticamente.</div>'+
        '<div class="btn-row"><button class="btn primary" id="cloudUsarNuvem">Usar a versão da nuvem</button><button class="btn" id="cloudUsarLocal">Manter este aparelho e enviar</button></div>';
    }else if(this.session){
      html+='<div class="muted">Conectado como '+U.esc(this.session.user.email)+'</div>'+
        '<div class="btn-row"><button class="btn small" id="cloudSyncAgora">↻ sincronizar agora</button><button class="btn small" id="cloudLogout">sair</button></div>';
    }else{
      html+='<div class="muted">Entre com seu e-mail para sincronizar e acessar os dados de qualquer aparelho.</div>'+
        '<div class="f-grid"><div class="field"><label class="f-label" for="cloudEmail">E-mail</label>'+
        '<div class="f-wrap"><input class="f-input" id="cloudEmail" style="text-align:left;" type="email" placeholder="voce@exemplo.com"></div></div></div>'+
        '<div class="btn-row"><button class="btn primary" id="cloudEnviar">Enviar link de acesso</button></div>';
    }
    box.innerHTML=html;
    box.querySelector('#cloudUsarNuvem')?.addEventListener('click',()=>this.resolverConflito(true));
    box.querySelector('#cloudUsarLocal')?.addEventListener('click',()=>this.resolverConflito(false));
    box.querySelector('#cloudSyncAgora')?.addEventListener('click',()=>this.pullAndMerge().then(()=>this.push()));
    box.querySelector('#cloudLogout')?.addEventListener('click',()=>this.signOut());
    box.querySelector('#cloudEnviar')?.addEventListener('click',()=>{
      const email=box.querySelector('#cloudEmail').value.trim();
      if(!email){toast('Informe um e-mail',true);return;}
      this.signIn(email);
    });
  }
};
/* integra sem tocar no código original: intercepta salvar e a renderização da aba Dados */
const _gfpSaveOrig=Store.save.bind(Store);
Store.save=function(){_gfpSaveOrig();CloudSync.schedulePush();};
const _gfpRDadosOrig=rDados;
rDados=function(el){_gfpRDadosOrig(el);CloudSync.renderPanel(el);};
function _gfpStartCloud(){CloudSync.init();}
if(document.readyState!=='loading')_gfpStartCloud();
else document.addEventListener('DOMContentLoaded',_gfpStartCloud);
</script>
