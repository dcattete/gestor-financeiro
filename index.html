<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<style>html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}</style>
<title>Gestor Financeiro Pessoal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- config.js define window.GFP_SUPABASE_CONFIG (sincronização em nuvem opcional). Se o arquivo não existir, o app funciona normalmente só no aparelho. -->
<script src="config.js"></script>
<style>
/* ══════════════ TOKENS (mesma identidade do simulador de referência) ══════════════ */
:root{
  --cream:#F5F0E8; --warm-white:#FAFAF7; --charcoal:#1C1C1E;
  --stone:#8C8578; --rust:#C4622D; --sage:#5A7A6A;
  --gold:#B8944A; --gold-light:#D4B06A; --border:#DDD8CE;
  --shadow:rgba(28,28,30,.08);
  --rec:#5A7A6A; --desp:#C4622D; --inv:#B8944A; --pos:#5A7A6A; --neg:#C4622D;
  --bg:var(--cream); --surf:var(--warm-white); --txt:var(--charcoal);
}
html[data-theme="dark"]{
  --bg:#171614; --surf:#211F1C; --txt:#EDE8DF; --border:#3A362F;
  --stone:#A29A8C; --shadow:rgba(0,0,0,.4); --cream:#171614; --warm-white:#211F1C; --charcoal:#EDE8DF;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{transition:none!important;animation:none!important;}}
body{background:var(--bg);font-family:'DM Sans',-apple-system,'Segoe UI',sans-serif;color:var(--txt);min-height:100vh;padding-bottom:calc(76px + env(safe-area-inset-bottom,0px));}
button{font-family:inherit;-webkit-tap-highlight-color:transparent;}
input,select,textarea{font-family:inherit;font-size:16px;}
:focus-visible{outline:2px solid var(--gold);outline-offset:1px;}

/* ══════════════ SHELL ══════════════ */
.shell{max-width:1180px;margin:0 auto;}
.hdr{background:var(--charcoal);color:#F5F0E8;padding:calc(14px + env(safe-area-inset-top,0px)) 20px 12px;position:relative;overflow:hidden;}
html[data-theme="dark"] .hdr{background:#0E0D0C;}
.hdr::before{content:'';position:absolute;top:-70px;right:-70px;width:200px;height:200px;border-radius:50%;border:1px solid rgba(245,240,232,.1);pointer-events:none;}
.hdr-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.hdr-eyebrow{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-light);font-weight:500;}
.hdr-title{font-family:'DM Serif Display',Georgia,serif;font-size:20px;line-height:1.1;}
.hdr-title em{font-style:italic;color:var(--gold-light);}
.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.hdr-btn{border:1px solid rgba(255,255,255,.25);background:transparent;color:rgba(245,240,232,.85);border-radius:3px;padding:6px 10px;font-size:11px;font-weight:500;cursor:pointer;min-height:32px;}
.hdr-btn:hover{border-color:var(--gold-light);color:var(--gold-light);}
.save-ind{font-size:10px;color:rgba(245,240,232,.55);letter-spacing:.06em;min-width:52px;text-align:right;}
.save-ind.ok{color:#9DC3AE;}

/* período */
.period-bar{background:var(--charcoal);border-top:1px solid rgba(255,255,255,.08);padding:8px 20px 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
html[data-theme="dark"] .period-bar{background:#0E0D0C;}
.pb-btn{border:1px solid rgba(255,255,255,.2);background:transparent;color:#F5F0E8;border-radius:3px;min-width:36px;min-height:36px;font-size:15px;cursor:pointer;}
.pb-label{font-family:'DM Serif Display',Georgia,serif;font-size:17px;color:#F5F0E8;min-width:130px;text-align:center;text-transform:capitalize;}
.pb-today{font-size:10px;color:var(--gold-light);background:transparent;border:1px solid rgba(184,148,74,.5);border-radius:3px;padding:5px 10px;cursor:pointer;min-height:32px;}
.pb-closed{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--rust);border:1px solid rgba(196,98,45,.55);border-radius:2px;padding:2px 7px;}

/* desktop tabs */
.tabs-desktop{display:none;background:var(--surf);border-bottom:1px solid var(--border);padding:0 20px;gap:2px;position:sticky;top:0;z-index:400;}
.tabd{border:none;background:transparent;color:var(--stone);padding:13px 14px;font-size:12px;font-weight:600;letter-spacing:.04em;cursor:pointer;border-bottom:2px solid transparent;min-height:44px;}
.tabd.active{color:var(--txt);border-bottom-color:var(--gold);}
@media(min-width:900px){
  .tabs-desktop{display:flex;}
  .nav-bottom{display:none!important;}
  body{padding-bottom:40px;}
}

/* bottom nav (mobile) */
.nav-bottom{position:fixed;bottom:0;left:0;right:0;z-index:800;background:var(--surf);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -4px 16px var(--shadow);}
.navb{flex:1;border:none;background:transparent;color:var(--stone);display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 2px 7px;font-size:9.5px;font-weight:600;letter-spacing:.02em;cursor:pointer;min-height:56px;}
.navb .ic{font-size:19px;line-height:1;}
.navb.active{color:var(--gold);}

/* ══════════════ LAYOUT COMUM ══════════════ */
.tab-page{display:none;padding:18px 16px 30px;}
.tab-page.active{display:block;}
@media(min-width:900px){.tab-page{padding:24px 20px 40px;}}
.sec-title{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--stone);margin:22px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
.sec-title:first-child{margin-top:0;}
.sec-num{font-family:'DM Serif Display',Georgia,serif;font-size:14px;color:var(--gold);letter-spacing:0;}
.sec-right{margin-left:auto;display:flex;gap:6px;align-items:center;letter-spacing:0;text-transform:none;}
.muted{color:var(--stone);font-size:10.5px;font-weight:300;line-height:1.5;}
.note{margin:12px 0;padding:11px 13px;border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:3px;font-size:10.5px;color:var(--stone);font-weight:300;line-height:1.55;background:rgba(184,148,74,.05);}
.note strong{color:var(--txt);font-weight:500;}
.note.warn{border-left-color:var(--rust);background:rgba(196,98,45,.05);}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(min-width:900px){.kpi-grid{grid-template-columns:repeat(4,1fr);gap:14px;}}
.kpi{border:1px solid var(--border);border-radius:3px;padding:13px 13px 11px;position:relative;overflow:hidden;background:var(--surf);}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--stone);}
.kpi.k-pos::after{background:var(--sage);}
.kpi.k-neg::after{background:var(--rust);}
.kpi.k-gold::after{background:var(--gold);}
.kpi.k-dark::after{background:var(--charcoal);}
.kpi-eyebrow{font-size:8.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--stone);margin-bottom:6px;display:flex;gap:5px;align-items:center;}
.kpi-value{font-family:'DM Serif Display',Georgia,serif;font-size:19px;line-height:1;margin-bottom:4px;white-space:nowrap;color:var(--txt);}
.kpi.k-pos .kpi-value{color:var(--sage);}
.kpi.k-neg .kpi-value{color:var(--rust);}
.kpi.k-gold .kpi-value{color:var(--gold);}
.kpi-sub{font-size:9.5px;color:var(--stone);font-weight:300;}
.delta-up{color:var(--sage);font-weight:600;}
.delta-down{color:var(--rust);font-weight:600;}

/* chips + segment + badges */
.chip-row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;}
.chip{border:1px solid var(--border);border-radius:3px;padding:8px 12px;display:flex;flex-direction:column;gap:2px;flex:1;min-width:118px;background:var(--surf);}
.chip-label{font-size:8px;letter-spacing:.11em;text-transform:uppercase;color:var(--stone);}
.chip-value{font-family:'DM Serif Display',Georgia,serif;font-size:14px;color:var(--txt);white-space:nowrap;}
.c-sage{color:var(--sage)!important;}.c-rust{color:var(--rust)!important;}.c-gold{color:var(--gold)!important;}
.seg{display:flex;border:1px solid var(--border);border-radius:3px;overflow:hidden;}
.seg-btn{flex:1;border:none;background:var(--surf);color:var(--stone);font-size:11.5px;font-weight:600;letter-spacing:.05em;cursor:pointer;min-height:40px;padding:0 12px;white-space:nowrap;}
.seg-btn.active{background:var(--charcoal);color:var(--cream);}
html[data-theme="dark"] .seg-btn.active{background:var(--gold);color:#171614;}
.badge{display:inline-flex;align-items:center;gap:5px;border-radius:12px;padding:2px 9px;font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;}
.b-ok{background:rgba(90,122,106,.14);color:var(--sage);}
.b-warn{background:rgba(184,148,74,.16);color:var(--gold);}
.b-bad{background:rgba(196,98,45,.14);color:var(--rust);}
.b-mut{background:rgba(140,133,120,.14);color:var(--stone);}

/* botões */
.btn{border:1px solid var(--border);background:var(--surf);color:var(--txt);border-radius:3px;padding:10px 16px;font-size:12px;font-weight:600;letter-spacing:.03em;cursor:pointer;min-height:44px;display:inline-flex;align-items:center;gap:7px;justify-content:center;}
.btn:hover{border-color:var(--gold);}
.btn.primary{background:var(--charcoal);color:var(--cream);border-color:var(--charcoal);}
html[data-theme="dark"] .btn.primary{background:var(--gold);color:#171614;border-color:var(--gold);}
.btn.danger{color:var(--rust);border-color:rgba(196,98,45,.5);}
.btn.small{min-height:34px;padding:6px 11px;font-size:11px;}
.btn.ghost{border-color:transparent;background:transparent;color:var(--stone);}
.btn:disabled{opacity:.45;cursor:default;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0;}

/* progress + semáforo */
.prog{height:7px;background:var(--border);border-radius:4px;overflow:hidden;position:relative;}
.prog>i{display:block;height:100%;border-radius:4px;background:var(--sage);transition:width .25s;}
.prog>i.warn{background:var(--gold);}
.prog>i.bad{background:var(--rust);}
.sem{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0;}
.sem.g{background:var(--sage);}.sem.y{background:var(--gold);}.sem.r{background:var(--rust);}

/* ══════════════ FORM ══════════════ */
.f-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 14px;}
@media(max-width:640px){.f-grid{grid-template-columns:1fr;}}
.field{display:flex;flex-direction:column;gap:5px;min-width:0;}
.f-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--stone);font-weight:500;}
.f-wrap{display:flex;align-items:center;border:1px solid var(--border);border-radius:3px;background:var(--bg);min-height:46px;}
.f-wrap:focus-within{border-color:var(--gold);}
.f-unit{padding-left:12px;font-size:11px;color:var(--stone);font-weight:500;flex-shrink:0;}
.f-unit-r{padding-right:12px;font-size:11px;color:var(--stone);font-weight:500;flex-shrink:0;}
.f-input,.f-select,.f-area{flex:1;width:100%;min-width:0;border:none;background:transparent;outline:none;padding:10px 12px;font-size:16px;color:var(--txt);}
.f-input[inputmode]{text-align:right;}
.f-select{appearance:none;-webkit-appearance:none;cursor:pointer;}
.f-area{resize:vertical;min-height:60px;font-size:14px;}
.f-hint{font-size:9.5px;color:var(--stone);font-weight:300;line-height:1.4;}
.f-err{font-size:10px;color:var(--rust);font-weight:500;}
.f-wrap.invalid{border-color:var(--rust);}
.check{display:flex;align-items:center;gap:9px;min-height:44px;font-size:13px;cursor:pointer;}
.check input{width:19px;height:19px;accent-color:var(--gold);}

/* ══════════════ LISTA/CARTÕES DE LANÇAMENTOS ══════════════ */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;align-items:center;}
.filter-bar .f-wrap{min-height:40px;flex:1;min-width:130px;}
.filter-bar .f-input,.filter-bar .f-select{padding:7px 10px;font-size:13px;}
.rowcard{border:1px solid var(--border);border-radius:3px;background:var(--surf);padding:12px 14px;margin-bottom:9px;}
.rowcard.inactive{opacity:.55;}
.rc-top{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
.rc-desc{font-weight:600;font-size:14px;}
.rc-cat{font-size:10px;color:var(--stone);}
.rc-val{margin-left:auto;font-family:'DM Serif Display',Georgia,serif;font-size:16px;white-space:nowrap;}
.rc-months{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-top:10px;}
@media(max-width:520px){.rc-months{grid-template-columns:repeat(4,1fr);}}
.rc-m{border:1px solid var(--border);border-radius:3px;padding:4px 3px;text-align:center;cursor:pointer;background:var(--bg);}
.rc-m .mlbl{font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--stone);display:block;}
.rc-m .mval{font-size:10.5px;font-weight:600;white-space:nowrap;}
.rc-m.zero .mval{color:var(--stone);font-weight:300;}
.rc-m.cur{border-color:var(--gold);}
.rc-m.locked{opacity:.5;}
.rc-actions{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap;}
.mini{border:1px solid var(--border);background:transparent;color:var(--stone);border-radius:3px;padding:6px 10px;font-size:10.5px;font-weight:600;cursor:pointer;min-height:32px;}
.mini:hover{color:var(--txt);border-color:var(--gold);}
.mini.danger{color:var(--rust);}

/* grade anual desktop */
.gridwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:3px;background:var(--surf);}
table.grid{border-collapse:collapse;font-size:11.5px;min-width:1080px;width:100%;}
table.grid th{position:sticky;top:0;background:var(--charcoal);color:var(--cream);font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:8px 6px;text-align:right;white-space:nowrap;z-index:5;}
table.grid th:first-child{text-align:left;left:0;z-index:6;min-width:170px;}
table.grid td{border-bottom:1px solid var(--border);padding:3px 4px;text-align:right;white-space:nowrap;}
table.grid td:first-child{text-align:left;position:sticky;left:0;background:var(--surf);font-weight:600;max-width:210px;overflow:hidden;text-overflow:ellipsis;}
table.grid td input{width:76px;border:1px solid transparent;background:transparent;text-align:right;font-size:11.5px;padding:5px 3px;border-radius:2px;color:var(--txt);}
table.grid td input:focus{border-color:var(--gold);background:var(--bg);outline:none;}
table.grid td input:disabled{color:var(--stone);}
table.grid .tot{font-weight:700;font-family:'DM Serif Display',Georgia,serif;}
table.grid tr.sumrow td{border-top:2px solid var(--border);font-weight:700;background:var(--bg);}

/* tabela simples */
.twrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table.plain{width:100%;border-collapse:collapse;font-size:12px;background:var(--surf);border:1px solid var(--border);border-radius:3px;}
table.plain th{font-size:8.5px;letter-spacing:.11em;text-transform:uppercase;color:var(--stone);text-align:right;padding:9px 10px;border-bottom:1px solid var(--border);white-space:nowrap;}
table.plain th:first-child,table.plain td:first-child{text-align:left;}
table.plain td{padding:8px 10px;border-bottom:1px solid rgba(221,216,206,.4);text-align:right;white-space:nowrap;}
table.plain tr:last-child td{border-bottom:none;}
table.plain .serif{font-family:'DM Serif Display',Georgia,serif;font-size:13px;}
table.plain tr.totr td{border-top:2px solid var(--border);font-weight:700;}

/* ══════════════ GRÁFICOS ══════════════ */
.chart-card{border:1px solid var(--border);border-radius:3px;padding:14px 12px 10px;background:var(--surf);margin-bottom:14px;}
.chart-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.chart-title{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--stone);}
.chart-box{display:block;width:100%;height:230px;}
.chart-box.tall{height:280px;}
.chart-legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.leg-item{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--stone);cursor:pointer;border:none;background:none;padding:3px 4px;min-height:28px;}
.leg-item.off{opacity:.35;text-decoration:line-through;}
.leg-dot{width:14px;height:3px;border-radius:2px;flex-shrink:0;}
.empty-state{padding:30px 16px;text-align:center;color:var(--stone);font-size:12px;font-weight:300;}

/* ══════════════ MODAL / SHEET ══════════════ */
.modal-back{position:fixed;inset:0;background:rgba(28,28,30,.45);z-index:900;display:none;}
.modal-back.open{display:block;}
.sheet{position:fixed;left:0;right:0;bottom:0;top:auto;max-height:92dvh;background:var(--surf);z-index:950;border-radius:14px 14px 0 0;display:none;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.25);}
.sheet.open{display:flex;}
@media(min-width:900px){.sheet{left:50%;right:auto;top:50%;bottom:auto;transform:translate(-50%,-50%);width:640px;max-height:86vh;border-radius:6px;}}
.sheet-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border);}
.sheet-title{font-family:'DM Serif Display',Georgia,serif;font-size:17px;flex:1;}
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;flex:1;}
.sheet-foot{display:flex;gap:8px;padding:12px 16px calc(12px + env(safe-area-inset-bottom,0px));border-top:1px solid var(--border);}
.sheet-foot .btn{flex:1;}

/* toast */
.toast{position:fixed;bottom:calc(86px + env(safe-area-inset-bottom,0px));left:16px;right:16px;z-index:1200;background:var(--sage);color:#fff;border-radius:8px;padding:11px 15px;font-size:12.5px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.2);opacity:0;pointer-events:none;transition:opacity .25s;max-width:420px;margin:0 auto;text-align:center;}
.toast.show{opacity:1;}
.toast.err{background:var(--rust);}
@media(min-width:900px){.toast{bottom:26px;}}

/* FAB */
.fab{position:fixed;right:16px;bottom:calc(76px + env(safe-area-inset-bottom,0px));z-index:820;width:54px;height:54px;border-radius:50%;background:var(--charcoal);color:var(--cream);border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 18px rgba(28,28,30,.35);display:none;align-items:center;justify-content:center;}
html[data-theme="dark"] .fab{background:var(--gold);color:#171614;}
@media(min-width:900px){.fab{bottom:26px;}}
.fab.show{display:flex;}

/* snapshot banner */
.snap-banner{background:rgba(184,148,74,.12);border-bottom:1px solid var(--border);padding:9px 16px;display:none;align-items:center;gap:10px;font-size:11px;color:var(--stone);font-weight:500;flex-wrap:wrap;}
body.is-snapshot .snap-banner{display:flex;}
.snap-banner strong{color:var(--gold);font-weight:600;letter-spacing:.08em;text-transform:uppercase;font-size:10px;}

/* diagnóstico */
.diag{border:1px solid var(--border);border-radius:3px;background:var(--surf);padding:12px;font-size:11px;margin-top:10px;font-family:ui-monospace,Menlo,monospace;}
.diag .ok{color:var(--sage);}
.diag .fail{color:var(--rust);font-weight:700;}

/* impressão */
@media print{
  .nav-bottom,.fab,.hdr-right,.period-bar button,.tabs-desktop,.btn,.filter-bar{display:none!important;}
  body{padding:0;background:#fff;}
  .tab-page{display:block!important;page-break-after:always;}
}
</style>
</head>
<body>

<div class="snap-banner" id="snapBanner"></div>

<header class="hdr">
  <div class="hdr-row">
    <div>
      <div class="hdr-eyebrow">Finanças da Família</div>
      <div class="hdr-title">Gestor Financeiro <em>Pessoal</em></div>
    </div>
    <div class="hdr-right">
      <span class="save-ind" id="saveInd" aria-live="polite"></span>
      <button class="hdr-btn" id="btnTheme" aria-label="Alternar tema claro e escuro">◐ Tema</button>
    </div>
  </div>
</header>

<div class="period-bar" id="periodBar">
  <button class="pb-btn" id="pbPrev" aria-label="Mês anterior">‹</button>
  <span class="pb-label" id="pbLabel">—</span>
  <button class="pb-btn" id="pbNext" aria-label="Próximo mês">›</button>
  <button class="pb-today" id="pbToday">hoje</button>
  <span class="pb-closed" id="pbClosed" style="display:none;">mês fechado</span>
</div>

<nav class="tabs-desktop" id="tabsDesktop" aria-label="Abas principais"></nav>

<main class="shell">
  <section class="tab-page" id="page-resumo" aria-label="Resumo"></section>
  <section class="tab-page" id="page-lanc" aria-label="Lançamentos"></section>
  <section class="tab-page" id="page-orc" aria-label="Orçamento e metas"></section>
  <section class="tab-page" id="page-inv" aria-label="Investimentos"></section>

/* ═══════════════════════════════════════════════════════════════
   01 · CONSTANTES E CONFIGURAÇÃO
═══════════════════════════════════════════════════════════════ */
const APP_VERSION='1.0.0';
const SCHEMA_VERSION=1;
const LS_KEY='gfp_v1';
const MESES_ABREV=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const MESES_NOME=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const CLASSES_INV=['Renda fixa','Ações','Fundos','Previdência','Imóvel','Veículo','Caixa','Cripto','Outros'];
const CLASSES_BEM=['Imóvel','Veículo'];
const CLASSIF_DESP=['fixa','variável','eventual','extraordinária'];
const TIPOS_META=[['despesa_max','Despesa máxima'],['receita_min','Receita mínima'],['economia_min','Economia mínima'],['aporte_min','Aporte mínimo'],['patrimonio','Patrimônio-alvo'],['renda_passiva','Renda passiva']];
const IS_SNAPSHOT=!!window.__GFP_SNAPSHOT__;

/* ═══════════════════════════════════════════════════════════════
   02 · UTILITÁRIOS (dinheiro em CENTAVOS inteiros; datas AAAA-MM)
═══════════════════════════════════════════════════════════════ */
const U={
  uid(){return 'id'+Date.now().toString(36)+Math.random().toString(36).slice(2,8);},
  esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));},
  /* centavos → 'R$ 1.234,56' */
  fc(c,noCents){
    if(c==null||isNaN(c))return '—';
    const neg=c<0,a=Math.abs(Math.round(c))/100;
    const s=a.toLocaleString('pt-BR',{minimumFractionDigits:noCents?0:2,maximumFractionDigits:noCents?0:2});
    return (neg?'−R$ ':'R$ ')+s;
  },
  fc0(c){return U.fc(c==null?null:Math.round(c/100)*100,true);},
  fcK(c){
    const neg=c<0,a=Math.abs(c)/100;let s;
    if(a>=1e6)s='R$'+(a/1e6).toFixed(1).replace('.',',')+'M';
    else if(a>=1e3)s='R$'+(a/1e3).toFixed(0)+'k';
    else s='R$'+a.toFixed(0);
    return (neg?'−':'')+s;
  },
  fpct(v,dec){if(v==null||isNaN(v)||!isFinite(v))return '—';return v.toFixed(dec==null?1:dec).replace('.',',')+'%';},
  /* parse pt-BR ou internacional → centavos (int). Regra: vírgula presente = decimal BR;
     só pontos: 1 ponto com 3 dígitos após = milhar, senão decimal. Sem conversão ambígua silenciosa. */
  pc(x){
    if(typeof x==='number')return isNaN(x)?null:Math.round(x*100);
    if(x==null)return null;
    let s=String(x).replace(/[R$\s ]/g,'').replace(/−/g,'-');
    if(s===''||s==='-')return null;
    if(s.indexOf(',')>-1){s=s.replace(/\./g,'').replace(',','.');}
    else{
      const dots=s.split('.').length-1;
      const after=s.lastIndexOf('.')>-1?s.length-s.lastIndexOf('.')-1:0;
      if(dots>1||(dots===1&&after===3))s=s.replace(/\./g,'');
    }
    const n=parseFloat(s);
    return isNaN(n)?null:Math.round(n*100);
  },
  pnum(x){const c=U.pc(x);return c==null?null:c/100;},
  /* input de moeda: centavos → texto editável */
  ic(c){if(c==null||c===0)return '';const a=c/100;return a.toLocaleString('pt-BR',{minimumFractionDigits:(c%100)?2:0,maximumFractionDigits:2});},
  mk(y,m){return y+'-'+String(m).padStart(2,'0');},
  mkParse(mk){const p=String(mk).split('-');return {y:+p[0],m:+p[1]};},
  mkAdd(mk,n){const {y,m}=U.mkParse(mk);const t=(y*12+(m-1))+n;return U.mk(Math.floor(t/12),(t%12)+1);},
  mkDiff(a,b){const A=U.mkParse(a),B=U.mkParse(b);return (A.y*12+A.m)-(B.y*12+B.m);},
  mkLabel(mk){const {y,m}=U.mkParse(mk);return MESES_ABREV[m-1]+'/'+String(y).slice(2);},
  mkLabelFull(mk){const {y,m}=U.mkParse(mk);return MESES_NOME[m-1]+' '+y;},
  mkNow(){const d=new Date();return U.mk(d.getFullYear(),d.getMonth()+1);},
  mkValid(mk){return /^\d{4}-(0[1-9]|1[0-2])$/.test(String(mk||''));},
  excelSerialToMk(n){ /* serial Excel (1900) → AAAA-MM */
    const d=new Date(Math.round((n-25569)*86400*1000));
    return U.mk(d.getUTCFullYear(),d.getUTCMonth()+1);
  },
  nowStr(){const d=new Date();const p=n=>String(n).padStart(2,'0');return p(d.getDate())+'/'+p(d.getMonth()+1)+'/'+d.getFullYear()+' '+p(d.getHours())+':'+p(d.getMinutes());},
  clamp(v,a,b){return Math.min(b,Math.max(a,v));},
  deep(o){return JSON.parse(JSON.stringify(o));},
  sum(arr){let t=0;for(const v of arr)t+=(v||0);return t;},
  download(blob,fname){
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.download=fname;a.href=url;
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),4000);
  }
};

function migrar(data){
  if(!data||typeof data!=='object')return null;
  if(!data.schema)data.schema=1;
  /* migrações futuras: if(data.schema===1){...; data.schema=2;} */
  if(data.schema>SCHEMA_VERSION){
    console.warn('Schema mais novo que a aplicação; carregando em modo compatível.');
  }
  const base=novoEstado();
  data.config=Object.assign(base.config,data.config||{});
  data.config.sim=Object.assign(premissasPadrao(),data.config.sim||{});
  ['rows','invest','metas','cenarios','fechados'].forEach(k=>{if(!Array.isArray(data[k]))data[k]=[];});
  return data;
}

/* ═══════════════════════════════════════════════════════════════
   04 · PERSISTÊNCIA (localStorage + autosave com indicador)
═══════════════════════════════════════════════════════════════ */
const Store={
  timer:null,
  load(){
    if(IS_SNAPSHOT){
      try{return migrar(JSON.parse(document.getElementById('snapshotData').textContent));}
      catch(e){console.error('Snapshot inválido',e);return novoEstado();}
    }

      try{
        localStorage.setItem(LS_KEY,JSON.stringify(S));
        if(ind){ind.textContent='✓ salvo';ind.className='save-ind ok';}
      }catch(e){
        console.error(e);
        if(ind){ind.textContent='erro ao salvar';ind.className='save-ind';}
        toast('Não foi possível salvar (armazenamento cheio?)',true);
      }
    },250);
  }

/* ═══════════════════════════════════════════════════════════════
   05 · CÁLCULOS FINANCEIROS (funções puras)
═══════════════════════════════════════════════════════════════ */
const FIN={
  /* taxa anual (%) → mensal equivalente composta (fração) */
  aaToAm(aa){return Math.pow(1+aa/100,1/12)-1;},
  amToAa(am){return (Math.pow(1+am/100,12)-1)*100;},
  valorMes(row,mk,campo){const m=row.meses&&row.meses[mk];return m?(m[campo]||0):0;},
  totalNatureza(st,nat,mk,campo){
    let t=0;
    for(const r of st.rows)if(r.ativo&&r.natureza===nat)t+=FIN.valorMes(r,mk,campo);
    return t;
  },
  porCategoria(st,nat,mk,campo){
    const map={};
    for(const r of st.rows){
      if(!r.ativo||r.natureza!==nat)continue;
      const v=FIN.valorMes(r,mk,campo);
      if(!v)continue;
      map[r.categoria||'Sem categoria']=(map[r.categoria||'Sem categoria']||0)+v;
    }
    return map;
  },
  /* investimentos: encadeia saldo mês a mês a partir do saldoInicial.
     saldo do mês = informado ?? (saldo anterior + aportes − resgates + rendimentos) */
  saldoAtivoAte(ativo,mkAlvo,mkInicio){
    let saldo=ativo.saldoInicial||0;
    const mks=Object.keys(ativo.meses||{}).filter(k=>U.mkValid(k)).sort();
    for(const mk of mks){
      if(U.mkDiff(mk,mkAlvo)>0)break;
      const m=ativo.meses[mk];
      if(m.saldo!=null)saldo=m.saldo;
      else saldo=saldo+(m.ap||0)-(m.res||0)+(m.rend||0);
    }
    return saldo;
  },
  investMes(st,mk){
    let ap=0,res=0,rend=0,patrFin=0,patrBens=0;
    for(const a of st.invest){
      if(!a.ativo)continue;
      const m=(a.meses||{})[mk];
      if(m){ap+=m.ap||0;res+=m.res||0;rend+=m.rend||0;}
      const s=FIN.saldoAtivoAte(a,mk);
      if(a.tipoAtivo==='bem')patrBens+=s;else patrFin+=s;
    }
    return {ap,res,rend,aportesLiq:ap-res,patrFin,patrBens,patrTotal:patrFin+patrBens};
  },
  resumoMes(st,mk){
    const rec=FIN.totalNatureza(st,'receita',mk,'r');
    const desp=FIN.totalNatureza(st,'despesa',mk,'r');
    const recP=FIN.totalNatureza(st,'receita',mk,'p');
    const despP=FIN.totalNatureza(st,'despesa',mk,'p');
    const inv=FIN.investMes(st,mk);
    const resultado=rec-desp;
    return {
      rec,desp,recP,despP,
      aportes:inv.ap,resgates:inv.res,aportesLiq:inv.aportesLiq,rendimentos:inv.rend,
      resultado, sobra:rec-desp-inv.aportesLiq,
      taxaPoupanca:rec>0?resultado/rec*100:null,
      patrFin:inv.patrFin,patrBens:inv.patrBens,patrTotal:inv.patrTotal
    };
  },
  /* progresso de meta no período */
  metaProgresso(st,meta,mk){
    const {y}=U.mkParse(mk);
    const mksAno=[];for(let m=1;m<=12;m++)mksAno.push(U.mk(y,m));
    const soma=(nat,campo,lista)=>U.sum(lista.map(k=>FIN.totalNatureza(st,nat,k,campo)));
    let realizado=0,alvo=meta.valorAlvo||0,invertida=false;
    const lista=meta.periodo==='anual'?mksAno:[mk];
    switch(meta.tipo){
      case 'despesa_max':realizado=soma('despesa','r',lista);invertida=true;break;
      case 'receita_min':realizado=soma('receita','r',lista);break;
      case 'economia_min':realizado=soma('receita','r',lista)-soma('despesa','r',lista);break;
      case 'aporte_min':realizado=U.sum(lista.map(k=>FIN.investMes(st,k).aportesLiq));break;
      case 'patrimonio':realizado=FIN.investMes(st,mk).patrTotal;break;
      case 'renda_passiva':realizado=FIN.investMes(st,mk).rend;break;
    }
    const pct=alvo>0?realizado/alvo*100:null;
    let status='ok';
    if(pct!=null){
      if(invertida)status=pct<=st.config.semaforo.amarelo?'ok':(pct<=st.config.semaforo.vermelho?'warn':'bad');
      else status=pct>=100?'ok':(pct>=60?'warn':'bad');
    }
    return {realizado,alvo,pct,invertida,status};
  }
};

/* ═══════════════════════════════════════════════════════════════
   06 · SIMULADOR DE APOSENTADORIA (motor mês a mês, valores em R$ float)
   Convenções documentadas: aportes creditados no FIM de cada mês
   (rendem a partir do mês seguinte); aporte extraordinário no mês
   escolhido; contribuição PGBL em dezembro; benefício fiscal (se
   reinvestido) creditado em maio do ano seguinte no patrimônio
   principal. Valores "reais" = nominais ÷ (1+inflação mensal)^t.
═══════════════════════════════════════════════════════════════ */
function simular(prem){
  const p=Object.assign(premissasPadrao(),prem||{});
  const im=p.rentabModo==='aa'?FIN.aaToAm(p.rentab):p.rentab/100;
  const inflM=FIN.aaToAm(p.inflacaoAa||0);
  const retiradaAa=p.retiradaModo==='am'?FIN.amToAa(p.retirada):p.retirada;
  const nMeses=Math.max(1,Math.round((p.horizonte||1)*12));
  const redutor=1-(p.redutorRend||0)/100;
  const patr0=(p.patrFin||0)+(p.bens||0)*(p.convBens||0)/100;
  const bensRestantes=(p.bens||0)*(1-(p.convBens||0)/100);
  const necessario0=retiradaAa>0?(p.rendaDesejada||0)*12/(retiradaAa/100)*(1+(p.margemSeg||0)/100):Infinity;

  const iPgbl=(p.pgblRentabAm||0)/100;
  const admM=FIN.aaToAm(p.pgblAdmAa||0);
  const contribAnualPgbl=p.pgblIncluir?(p.pgblRendaBrutaAnual||0)*(p.pgblPct||0)/100:0;
  const beneficioAnual=contribAnualPgbl*Math.min((p.pgblPct||0),12)/Math.max((p.pgblPct||0),0.0001)*((p.pgblAliquota||0)/100);
  /* benefício = contribuição dedutível (limitada a 12% da renda) × alíquota */

  let patr=patr0,pgbl=0,aportesAcum=0,rendAcum=0,benefAcum=0,contribPgblAcum=0;
  let mesMeta=null;
  const serie=[];
  serie.push({t:0,patr,pgblLiq:0,total:patr,alvo:necessario0,aportesAcum:0,rendAcum:0});
  for(let t=1;t<=nMeses;t++){
    const ano=Math.ceil(t/12),mesDoAno=((t-1)%12)+1;
    const fator=Math.pow(1+(p.crescAportesAa||0)/100,ano-1);
    const rend=patr*im*redutor;
    const rendPg=pgbl*(iPgbl-admM);
    patr+=rend;pgbl+=rendPg;rendAcum+=rend+rendPg;
    let aporte=(p.aporteMensal||0)*fator;
    if(mesDoAno===(p.mesExtra||12))aporte+=(p.aporteExtra||0)*fator;
    patr+=aporte;aportesAcum+=aporte;
    if(p.pgblIncluir&&mesDoAno===12){
      const c=contribAnualPgbl*fator;
      pgbl+=c;contribPgblAcum+=c;aportesAcum+=c;
    }
    if(p.pgblIncluir&&p.pgblReinvestir&&mesDoAno===5&&ano>1){
      const b=beneficioAnual*Math.pow(1+(p.crescAportesAa||0)/100,ano-2);
      patr+=b;benefAcum+=b;
    }
    const pgblLiq=pgbl*(1-(p.pgblTribResgate||0)/100);
    const total=patr+pgblLiq;
    const alvo=isFinite(necessario0)?necessario0*Math.pow(1+inflM,t):Infinity;
    if(mesMeta==null&&total>=alvo)mesMeta=t;
    serie.push({t,patr,pgblLiq,total,alvo,aportesAcum,rendAcum});
  }
  const fim=serie[serie.length-1];
  const defl=Math.pow(1+inflM,nMeses);
  const rendaPassivaFim=isFinite(necessario0)?fim.total*(retiradaAa/100)/12/(1+(p.margemSeg||0)/100):fim.total*(retiradaAa/100)/12;
  return {
    prem:p,im,inflM,retiradaAa,nMeses,serie,necessario0,
    patrFinalNominal:fim.total,patrFinalReal:fim.total/defl,
    patrPrincipal:fim.patr,pgblBruto:pgbl,pgblLiquido:fim.pgblLiq,
    aportesAcum:fim.aportesAcum,rendAcum:fim.rendAcum,
    benefAcum,contribPgblAcum,bensRestantes,
    rendaPassivaMes:rendaPassivaFim,rendaPassivaMesReal:rendaPassivaFim/defl,
    pctMeta:isFinite(necessario0)&&necessario0>0?fim.total/(necessario0*defl)*100:null,
    mesMeta, jaAtingida:mesMeta===0||(serie[0].total>=serie[0].alvo)
  };
}
/* meta não atingida: aporte mensal adicional necessário (busca binária) */
function aporteNecessario(prem){
  const base=simular(prem);
  if(base.mesMeta!=null)return 0;
  let lo=0,hi=1;
  const alvoOk=extra=>{
    const r=simular(Object.assign({},prem,{aporteMensal:(prem.aporteMensal||0)+extra}));
    return r.mesMeta!=null;
  };
  while(!alvoOk(hi)&&hi<1e9)hi*=2;
  if(hi>=1e9)return null;
  for(let i=0;i<40;i++){const mid=(lo+hi)/2;if(alvoOk(mid))hi=mid;else lo=mid;}
  return hi;
}
/* prazo adicional além do horizonte (até 100 anos) */
function prazoAdicional(prem){
  const r=simular(Object.assign({},prem,{horizonte:100}));
  if(r.mesMeta==null)return null;
  const extraMeses=r.mesMeta-Math.round((prem.horizonte||1)*12);
  return extraMeses>0?extraMeses:0;
}

/* ═══════════════════════════════════════════════════════════════
   07 · XLSX NATIVO (ZIP store p/ exportar; DecompressionStream p/ importar)
═══════════════════════════════════════════════════════════════ */
const XL=(()=>{
  const CRC_TABLE=(()=>{const t=new Uint32Array(256);for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;t[n]=c>>>0;}return t;})();
  function crc32(u8){let c=0xFFFFFFFF;for(let i=0;i<u8.length;i++)c=CRC_TABLE[(c^u8[i])&0xFF]^(c>>>8);return (c^0xFFFFFFFF)>>>0;}
  const enc=new TextEncoder(),dec=new TextDecoder();
  function zipStore(files){ /* files: [{name, data:Uint8Array}] → Blob zip (método store) */
    const parts=[],central=[];let offset=0;
    const dt=0,dd=0x21;
    for(const f of files){
      const nameB=enc.encode(f.name),crc=crc32(f.data),sz=f.data.length;
      const lh=new DataView(new ArrayBuffer(30));
      lh.setUint32(0,0x04034b50,true);lh.setUint16(4,20,true);lh.setUint16(6,0,true);lh.setUint16(8,0,true);
      lh.setUint16(10,dt,true);lh.setUint16(12,dd,true);lh.setUint32(14,crc,true);
      lh.setUint32(18,sz,true);lh.setUint32(22,sz,true);lh.setUint16(26,nameB.length,true);lh.setUint16(28,0,true);
      parts.push(new Uint8Array(lh.buffer),nameB,f.data);
      const ch=new DataView(new ArrayBuffer(46));
      ch.setUint32(0,0x02014b50,true);ch.setUint16(4,20,true);ch.setUint16(6,20,true);ch.setUint16(8,0,true);ch.setUint16(10,0,true);
      ch.setUint16(12,dt,true);ch.setUint16(14,dd,true);ch.setUint32(16,crc,true);ch.setUint32(20,sz,true);ch.setUint32(24,sz,true);
      ch.setUint16(28,nameB.length,true);ch.setUint32(42,offset,true);
      central.push(new Uint8Array(ch.buffer),nameB);
      offset+=30+nameB.length+sz;
    }
    let cdSize=0;central.forEach(u=>cdSize+=u.length);
    const eocd=new DataView(new ArrayBuffer(22));
    eocd.setUint32(0,0x06054b50,true);eocd.setUint16(8,files.length,true);eocd.setUint16(10,files.length,true);
    eocd.setUint32(12,cdSize,true);eocd.setUint32(16,offset,true);
    return new Blob([...parts,...central,new Uint8Array(eocd.buffer)],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  }
  function colName(i){let s='';i++;while(i>0){const m=(i-1)%26;s=String.fromCharCode(65+m)+s;i=Math.floor((i-1)/26);}return s;}
  function escXml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function sheetXml(aoa){
    let rows='';
    aoa.forEach((row,ri)=>{
      let cells='';
      row.forEach((v,ci)=>{
        if(v==null||v==='')return;
        const ref=colName(ci)+(ri+1);
        if(typeof v==='number'&&isFinite(v))cells+='<c r="'+ref+'"><v>'+v+'</v></c>';
        else cells+='<c r="'+ref+'" t="inlineStr"><is><t xml:space="preserve">'+escXml(v)+'</t></is></c>';
      });
      rows+='<row r="'+(ri+1)+'">'+cells+'</row>';
    });
    return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>'+rows+'</sheetData></worksheet>';
  }
  function write(sheets){ /* sheets: [{name, aoa}] → Blob .xlsx */
    const files=[];
    let types='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>';
    let wbSheets='',wbRels='';
    sheets.forEach((s,i)=>{
      types+='<Override PartName="/xl/worksheets/sheet'+(i+1)+'.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>';
      wbSheets+='<sheet name="'+escXml(s.name)+'" sheetId="'+(i+1)+'" r:id="rId'+(i+1)+'"/>';
      wbRels+='<Relationship Id="rId'+(i+1)+'" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet'+(i+1)+'.xml"/>';
      files.push({name:'xl/worksheets/sheet'+(i+1)+'.xml',data:enc.encode(sheetXml(s.aoa))});
    });
    types+='</Types>';
    files.unshift(
      {name:'[Content_Types].xml',data:enc.encode(types)},
      {name:'_rels/.rels',data:enc.encode('<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>')},
      {name:'xl/workbook.xml',data:enc.encode('<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>'+wbSheets+'</sheets></workbook>')},
      {name:'xl/_rels/workbook.xml.rels',data:enc.encode('<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+wbRels+'</Relationships>')}
    );
    return zipStore(files);
  }
  async function inflate(u8){
    const ds=new DecompressionStream('deflate-raw');
    const stream=new Blob([u8]).stream().pipeThrough(ds);
    return new Uint8Array(await new Response(stream).arrayBuffer());
  }
  async function unzip(buf){
    const u8=new Uint8Array(buf),dv=new DataView(buf);
    let e=-1;
    for(let i=u8.length-22;i>=Math.max(0,u8.length-65558);i--){
      if(dv.getUint32(i,true)===0x06054b50){e=i;break;}
    }
    if(e<0)throw new Error('Arquivo ZIP/XLSX inválido');
    const count=dv.getUint16(e+10,true),cdOff=dv.getUint32(e+16,true);
    const out={};let p=cdOff;
    for(let i=0;i<count;i++){
      if(dv.getUint32(p,true)!==0x02014b50)break;
      const method=dv.getUint16(p+10,true),csz=dv.getUint32(p+20,true),
        nlen=dv.getUint16(p+28,true),elen=dv.getUint16(p+30,true),clen=dv.getUint16(p+32,true),
        lhOff=dv.getUint32(p+42,true);
      const name=dec.decode(u8.subarray(p+46,p+46+nlen));
      const lnlen=dv.getUint16(lhOff+26,true),lelen=dv.getUint16(lhOff+28,true);
      const dataStart=lhOff+30+lnlen+lelen;
      const comp=u8.subarray(dataStart,dataStart+csz);
      out[name]=method===0?comp.slice():await inflate(comp);
      p+=46+nlen+elen+clen;
    }
    return out;
  }
  function parseSheetXml(xml,shared){
    const doc=new DOMParser().parseFromString(xml,'application/xml');
    const aoa=[];
    doc.querySelectorAll('row').forEach(rowEl=>{
      const ri=+rowEl.getAttribute('r')-1;
      if(!aoa[ri])aoa[ri]=[];
      rowEl.querySelectorAll('c').forEach(c=>{
        const ref=c.getAttribute('r')||'';
        const colLetters=ref.replace(/\d+/g,'');
        let ci=0;for(const ch of colLetters)ci=ci*26+(ch.charCodeAt(0)-64);ci--;
        const t=c.getAttribute('t');
        let val=null;
        if(t==='inlineStr'){const tEl=c.querySelector('is t');val=tEl?tEl.textContent:'';}
        else{
          const vEl=c.querySelector('v');
          if(vEl){
            if(t==='s')val=shared[+vEl.textContent]??'';
            else if(t==='str')val=vEl.textContent;
            else if(t==='b')val=vEl.textContent==='1';
            else val=parseFloat(vEl.textContent);
          }
        }
        if(val!==null&&ci>=0)aoa[ri][ci]=val;
      });
    });
    for(let i=0;i<aoa.length;i++)if(!aoa[i])aoa[i]=[];
    return aoa;
  }
  async function read(buf){ /* → [{name, aoa}] */
    const files=await unzip(buf);
    const wbXml=dec.decode(files['xl/workbook.xml']||new Uint8Array());
    if(!wbXml)throw new Error('workbook.xml não encontrado — o arquivo é um .xlsx?');
    const wbDoc=new DOMParser().parseFromString(wbXml,'application/xml');
    const relXml=dec.decode(files['xl/_rels/workbook.xml.rels']||new Uint8Array());
    const relDoc=new DOMParser().parseFromString(relXml,'application/xml');
    const relMap={};
    relDoc.querySelectorAll('Relationship').forEach(r=>{relMap[r.getAttribute('Id')]='xl/'+r.getAttribute('Target').replace(/^\//,'').replace(/^xl\//,'');});
    let shared=[];
    if(files['xl/sharedStrings.xml']){
      const sd=new DOMParser().parseFromString(dec.decode(files['xl/sharedStrings.xml']),'application/xml');
      sd.querySelectorAll('si').forEach(si=>{
        let txt='';si.querySelectorAll('t').forEach(t=>txt+=t.textContent);shared.push(txt);
      });
    }
    const sheets=[];
    wbDoc.querySelectorAll('sheet').forEach(sh=>{
      const rid=sh.getAttribute('r:id')||sh.getAttributeNS('http://schemas.openxmlformats.org/officeDocument/2006/relationships','id');
      const target=relMap[rid];
      if(target&&files[target])sheets.push({name:sh.getAttribute('name'),aoa:parseSheetXml(dec.decode(files[target]),shared)});
    });
    return sheets;
  }
  return {write,read,crc32,zipStore,suportaImport:typeof DecompressionStream!=='undefined'};
})();

/* ═══════════════════════════════════════════════════════════════
   08 · TESTES INTERNOS (modo diagnóstico: ?diag=1)
═══════════════════════════════════════════════════════════════ */
const TESTES=[
  ['parse pt-BR "1.234,56" → 123456',()=>U.pc('1.234,56')===123456],
  ['parse internacional "1234.56" → 123456',()=>U.pc('1234.56')===123456],

  ['mkAdd atravessa o ano',()=>U.mkAdd('2026-11',3)==='2027-02'],

  ['resumo: resultado = receitas − despesas',()=>{

    st.rows.push({id:'b',natureza:'despesa',categoria:'Y',ativo:true,meses:{'2026-01':{p:0,r:180000}}});
    const r=FIN.resumoMes(st,'2026-01');

  }],
  ['taxa de poupança com receita zero → null',()=>{

  }],
  ['saldo de investimento encadeado',()=>{
    const a={saldoInicial:100000,tipoAtivo:'financeiro',ativo:true,
      meses:{'2026-01':{ap:50000,res:0,rend:1000,saldo:null},'2026-02':{ap:0,res:20000,rend:1300,saldo:null}}};
    return FIN.saldoAtivoAte(a,'2026-02')===100000+50000+1000-20000+1300;
  }],
  ['saldo informado sobrepõe o calculado',()=>{
    const a={saldoInicial:100000,tipoAtivo:'financeiro',ativo:true,
      meses:{'2026-01':{ap:0,res:0,rend:0,saldo:999999}}};
    return FIN.saldoAtivoAte(a,'2026-03')===999999;
  }],
  ['simulador: taxa 0 → patrimônio = inicial + aportes',()=>{
    const r=simular({patrFin:1000,bens:0,convBens:0,aporteMensal:100,aporteExtra:0,rentabModo:'am',rentab:0,
      inflacaoAa:0,horizonte:2,rendaDesejada:0,retirada:4,margemSeg:0,pgblIncluir:false,crescAportesAa:0});
    return Math.abs(r.patrFinalNominal-(1000+100*24))<1e-6;
  }],
  ['simulador: taxa negativa não explode',()=>{
    const r=simular({patrFin:100000,bens:0,aporteMensal:0,aporteExtra:0,rentabModo:'am',rentab:-1,
      inflacaoAa:0,horizonte:5,rendaDesejada:1000,retirada:4,margemSeg:0,pgblIncluir:false});
    return isFinite(r.patrFinalNominal)&&r.patrFinalNominal<100000;
  }],
  ['simulador: meta já atingida no início',()=>{
    const r=simular({patrFin:10000000,bens:0,aporteMensal:0,aporteExtra:0,rentabModo:'am',rentab:0.5,
      inflacaoAa:0,horizonte:1,rendaDesejada:1000,retirada:4,margemSeg:0,pgblIncluir:false});
    return r.jaAtingida===true;
  }],
  ['simulador: retirada 0 → necessário infinito, sem crash',()=>{
    const r=simular({patrFin:1000,bens:0,aporteMensal:0,aporteExtra:0,rentabModo:'am',rentab:1,
      inflacaoAa:0,horizonte:1,rendaDesejada:1000,retirada:0,margemSeg:0,pgblIncluir:false});
    return !isFinite(r.necessario0)&&r.mesMeta===null;
  }],
  ['simulador: inflação > rentabilidade reduz valor real',()=>{
    const r=simular({patrFin:100000,bens:0,aporteMensal:0,aporteExtra:0,rentabModo:'am',rentab:0.3,
      inflacaoAa:10,horizonte:10,rendaDesejada:0,retirada:4,margemSeg:0,pgblIncluir:false});
    return r.patrFinalReal<r.patrFinalNominal;
  }],
  ['aporteNecessario encontra solução',()=>{
    const prem={patrFin:0,bens:0,aporteMensal:0,aporteExtra:0,rentabModo:'am',rentab:0.8,
      inflacaoAa:0,horizonte:10,rendaDesejada:2000,retirada:4,margemSeg:0,pgblIncluir:false,crescAportesAa:0};
    const extra=aporteNecessario(prem);
    if(extra==null)return false;
    const r=simular(Object.assign({},prem,{aporteMensal:extra*1.001}));
    return r.mesMeta!=null;
  }],
  ['CRC32 de "abc" = 0x352441C2',()=>XL.crc32(new TextEncoder().encode('abc'))===0x352441C2],
  ['serial Excel 45658 → 2025-01',()=>U.excelSerialToMk(45658)==='2025-01'],
];
async function rodarTestes(){
  const res=[];
  for(const [nome,fn] of TESTES){
    try{const ok=await fn();res.push({nome,ok:!!ok});}
    catch(e){res.push({nome,ok:false,erro:e.message});}
  }
  /* roundtrip xlsx (assíncrono, só onde import é suportado) */
  if(XL.suportaImport){
    try{
      const blob=XL.write([{name:'T',aoa:[['a','b'],['texto',123.45]]}]);
      const sheets=await XL.read(await blob.arrayBuffer());
      const ok=sheets[0].name==='T'&&sheets[0].aoa[1][0]==='texto'&&Math.abs(sheets[0].aoa[1][1]-123.45)<1e-9;
      res.push({nome:'roundtrip XLSX exportar→importar',ok});
    }catch(e){res.push({nome:'roundtrip XLSX exportar→importar',ok:false,erro:e.message});}
  }else res.push({nome:'roundtrip XLSX (DecompressionStream indisponível)',ok:true,erro:'pulado'});
  return res;
}

<script>
'use strict';
/* ═══════════════════════════════════════════════════════════════
   09 · ESTADO DA APLICAÇÃO

function toast(msg,err){

/* sheet/modal */

/* ═══════════════════════════════════════════════════════════════
   10 · GRÁFICOS SVG
═══════════════════════════════════════════════════════════════ */
const CH={
  el(tag,attrs){const e=document.createElementNS('http://www.w3.org/2000/svg',tag);for(const k in attrs)e.setAttribute(k,attrs[k]);return e;},
  txt(svg,x,y,t,size,fill,weight,anchor){

  },
  frame(W,H){return CH.el('svg',{width:'100%',height:'100%',viewBox:'0 0 '+W+' '+H,preserveAspectRatio:'xMidYMid meet',role:'img'});},
  /* linhas: series=[{label,color,dash,vals[]}], labels=[] (x) */
  line(box,series,labels,opts){
    opts=opts||{};
    box.innerHTML='';
    const vis=series.filter(s=>!UI.legendOff[s.label]);
    if(!vis.length||!labels.length){box.innerHTML='<div class="empty-state">Sem dados no período</div>';return;}
    let mn=0,mx=-Infinity;
    vis.forEach(s=>s.vals.forEach(v=>{if(v!=null){if(v<mn)mn=v;if(v>mx)mx=v;}}));

    const svg=CH.frame(W,H);
    [0,.25,.5,.75,1].forEach(f=>{
      const v=mx-rg*f,y=Y(v);
      svg.appendChild(CH.el('line',{x1:P.l,y1:y,x2:W-P.r,y2:y,stroke:'#DDD8CE','stroke-width':'.5'}));
      CH.txt(svg,P.l-4,y+3,(opts.fmtY||U.fcK)(v),'7','#8C8578','400','end');
    });
    if(mn<0){const y0=Y(0);svg.appendChild(CH.el('line',{x1:P.l,y1:y0,x2:W-P.r,y2:y0,stroke:'#1C1C1E','stroke-width':'1','stroke-dasharray':'4,3',opacity:'.5'}));}
    const step=Math.max(1,Math.ceil(labels.length/7));
    labels.forEach((lb,i)=>{if(i%step===0||i===labels.length-1)CH.txt(svg,X(i),H-P.b+12,lb,'6.5','#8C8578','400','middle');});
    if(opts.linhaMeta!=null&&opts.linhaMeta<=mx){
      const ym=Y(opts.linhaMeta);
      svg.appendChild(CH.el('line',{x1:P.l,y1:ym,x2:W-P.r,y2:ym,stroke:'#C4622D','stroke-width':'1','stroke-dasharray':'4,3',opacity:'.75'}));
      CH.txt(svg,W-P.r+3,ym+3,'meta','7','#C4622D','600','start');
    }
    vis.forEach(s=>{
      let d='',started=false;
      s.vals.forEach((v,i)=>{if(v==null){started=false;return;}d+=(started?'L':'M')+X(i).toFixed(1)+','+Y(v).toFixed(1);started=true;});
      const at={d,fill:'none',stroke:s.color,'stroke-width':s.w||2,'stroke-linejoin':'round','stroke-linecap':'round'};
      if(s.dash)at['stroke-dasharray']=s.dash;
      svg.appendChild(CH.el('path',at));
      const last=s.vals.length-1;
      if(s.vals[last]!=null){
        svg.appendChild(CH.el('circle',{cx:X(last),cy:Y(s.vals[last]),r:'2.6',fill:s.color}));
        CH.txt(svg,X(last)+4,Y(s.vals[last])+3,(opts.fmtY||U.fcK)(s.vals[last]),'7',s.color,'600','start');
      }
    });
    box.appendChild(svg);
  },
  /* barras agrupadas ou empilhadas */
  bar(box,series,labels,opts){
    opts=opts||{};
    box.innerHTML='';
    const vis=series.filter(s=>!UI.legendOff[s.label]);
    if(!vis.length||!labels.length){box.innerHTML='<div class="empty-state">Sem dados no período</div>';return;}
    let mn=0,mx=0;
    labels.forEach((_,i)=>{
      if(opts.stack){let acc=0;vis.forEach(s=>acc+=Math.max(0,s.vals[i]||0));if(acc>mx)mx=acc;}
      else vis.forEach(s=>{const v=s.vals[i]||0;if(v>mx)mx=v;if(v<mn)mn=v;});
    });
    if(mx<=mn)mx=mn+1;let rg=mx-mn;mx+=rg*.08;rg=mx-mn;
    const W=420,H=210,P={t:12,r:14,b:24,l:52},cw=W-P.l-P.r,ch=H-P.t-P.b;
    const Y=v=>P.t+(mx-v)/rg*ch;
    const svg=CH.frame(W,H);
    [0,.25,.5,.75,1].forEach(f=>{
      const v=mx-rg*f,y=Y(v);
      svg.appendChild(CH.el('line',{x1:P.l,y1:y,x2:W-P.r,y2:y,stroke:'#DDD8CE','stroke-width':'.5'}));
      CH.txt(svg,P.l-4,y+3,(opts.fmtY||U.fcK)(v),'7','#8C8578','400','end');
    });
    const grpW=cw/labels.length;
    const step=Math.max(1,Math.ceil(labels.length/7));
    labels.forEach((lb,i)=>{if(i%step===0||i===labels.length-1)CH.txt(svg,P.l+grpW*(i+.5),H-P.b+12,lb,'6.5','#8C8578','400','middle');});
    labels.forEach((_,i)=>{
      if(opts.stack){
        let acc=0;
        vis.forEach(s=>{
          const v=Math.max(0,s.vals[i]||0);if(!v)return;
          const y1=Y(acc),y2=Y(acc+v);
          svg.appendChild(CH.el('rect',{x:P.l+grpW*i+grpW*.16,y:y2,width:grpW*.68,height:Math.max(1,y1-y2),fill:s.color,rx:'1'}));
          acc+=v;
        });
      }else{
        const bw=grpW*.72/vis.length;
        vis.forEach((s,si)=>{
          const v=s.vals[i]||0;if(!v)return;
          const y0=Y(0),yv=Y(v);
          svg.appendChild(CH.el('rect',{x:P.l+grpW*i+grpW*.14+bw*si,y:Math.min(y0,yv),width:Math.max(1.5,bw-1),height:Math.max(1,Math.abs(y0-yv)),fill:s.color,rx:'1'}));
        });
      }
    });
    if(mn<0){const y0=Y(0);svg.appendChild(CH.el('line',{x1:P.l,y1:y0,x2:W-P.r,y2:y0,stroke:'#1C1C1E','stroke-width':'1',opacity:'.5'}));}
    box.appendChild(svg);
  },
  donut(box,items){
    box.innerHTML='';
    const tot=U.sum(items.map(i=>i.val));
    if(tot<=0){box.innerHTML='<div class="empty-state">Sem dados no período</div>';return;}
    const W=420,H=210,cx=110,cy=105,R=78,r=46;
    const svg=CH.frame(W,H);
    let ang=-Math.PI/2;
    items.forEach(it=>{
      const frac=it.val/tot,a2=ang+frac*2*Math.PI;
      const large=frac>.5?1:0;
      const x1=cx+R*Math.cos(ang),y1=cy+R*Math.sin(ang),x2=cx+R*Math.cos(a2),y2=cy+R*Math.sin(a2);
      const xi2=cx+r*Math.cos(a2),yi2=cy+r*Math.sin(a2),xi1=cx+r*Math.cos(ang),yi1=cy+r*Math.sin(ang);
      if(frac>=0.999){svg.appendChild(CH.el('circle',{cx,cy,r:R,fill:'none',stroke:it.color,'stroke-width':R-r}));}
      else svg.appendChild(CH.el('path',{d:`M${x1},${y1} A${R},${R} 0 ${large} 1 ${x2},${y2} L${xi2},${yi2} A${r},${r} 0 ${large} 0 ${xi1},${yi1} Z`,fill:it.color}));
      ang=a2;
    });
    CH.txt(svg,cx,cy-2,U.fcK(tot),'12','#1C1C1E','700');
    CH.txt(svg,cx,cy+12,'total','7','#8C8578');
    let ly=26;
    items.forEach(it=>{
      svg.appendChild(CH.el('rect',{x:222,y:ly-7,width:9,height:9,rx:2,fill:it.color}));
      CH.txt(svg,236,ly+1,it.label.length>22?it.label.slice(0,21)+'…':it.label,'8','#1C1C1E','500','start');
      CH.txt(svg,414,ly+1,U.fcK(it.val)+' · '+U.fpct(it.val/tot*100,0),'7.5','#8C8578','400','end');
      ly+=17;if(ly>H-8)ly=H-8;
    });
    box.appendChild(svg);
  },
  legenda(cont,series,onToggle){
    cont.innerHTML='';
    series.forEach(s=>{
      const b=document.createElement('button');
      b.className='leg-item'+(UI.legendOff[s.label]?' off':'');
      b.innerHTML='<span class="leg-dot" style="background:'+s.color+'"></span>'+U.esc(s.label);
      b.setAttribute('aria-label','Alternar série '+s.label);
      b.addEventListener('click',()=>{UI.legendOff[s.label]=!UI.legendOff[s.label];onToggle();});
      cont.appendChild(b);
    });
  },
  png(boxId,fname){
    const svg=document.getElementById(boxId)?.querySelector('svg');
    if(!svg){toast('Gráfico vazio',true);return;}
    const xml=new XMLSerializer().serializeToString(svg);
    const img=new Image();
    img.onload=()=>{
      const cv=document.createElement('canvas');cv.width=1260;cv.height=630;
      const ctx=cv.getContext('2d');ctx.fillStyle='#FAFAF7';ctx.fillRect(0,0,cv.width,cv.height);
      ctx.drawImage(img,0,0,cv.width,cv.height);
      cv.toBlob(b=>{if(b)U.download(b,fname+'.png');toast('PNG exportado');},'image/png');
    };
    img.onerror=()=>toast('Não foi possível gerar o PNG neste navegador',true);
    img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(xml);
  }
};

function kpiHtml(eyebrow,valor,sub,cls,ajuda){
  return '<div class="kpi '+(cls||'')+'"><div class="kpi-eyebrow">'+eyebrow+(ajuda?' <span title="'+U.esc(ajuda)+'" aria-label="'+U.esc(ajuda)+'" style="cursor:help;">ⓘ</span>':'')+'</div>'+
    '<div class="kpi-value">'+valor+'</div><div class="kpi-sub">'+(sub||'')+'</div></div>';
}
function deltaTxt(atual,ant){
  if(ant===0&&atual===0)return 'sem movimento anterior';
  if(ant===0)return 'sem base anterior';
  const d=(atual-ant)/Math.abs(ant)*100;
  const cls=d>=0?'delta-up':'delta-down';
  return '<span class="'+cls+'">'+(d>=0?'▲':'▼')+' '+U.fpct(Math.abs(d))+'</span> vs mês anterior';
}
function rResumo(el){
  const r=FIN.resumoMes(S,UI.mk);

  const metas=S.metas.filter(m=>m.ativo).slice(0,4);

  Object.keys(catR).forEach(c=>{
    if(catP[c]&&catR[c]>catP[c])alertas.push('Categoria <strong>'+U.esc(c)+'</strong> estourou o orçamento: '+U.fc(catR[c])+' de '+U.fc(catP[c])+'.');
  });
  if(r.sobra<0&&r.resultado>=0)alertas.push('Aportes maiores que a sobra do mês — caixa negativo em '+U.fc(r.sobra)+'.');
  /* últimos 12 meses */
  const mks=[];for(let i=11;i>=0;i--)mks.push(U.mkAdd(UI.mk,-i));
  const recS=mks.map(k=>FIN.totalNatureza(S,'receita',k,'r')),despS=mks.map(k=>FIN.totalNatureza(S,'despesa',k,'r'));

  el.innerHTML=
    '<div class="sec-title"><span class="sec-num">01</span> Mês selecionado <span class="sec-right muted">'+U.mkLabelFull(UI.mk)+'</span></div>'+
    '<div class="kpi-grid">'+
    kpiHtml('Receitas realizadas',U.fc(r.rec),deltaTxt(r.rec,ant.rec),'k-pos')+
    kpiHtml('Despesas realizadas',U.fc(r.desp),deltaTxt(r.desp,ant.desp),'k-neg')+
    kpiHtml('Resultado antes dos aportes',U.fc(r.resultado),'receitas − despesas',r.resultado>=0?'k-pos':'k-neg')+
    kpiHtml('Taxa de poupança',r.taxaPoupanca==null?'—':U.fpct(r.taxaPoupanca),'resultado ÷ receitas','k-gold','Percentual da receita que sobrou antes dos aportes')+
    kpiHtml('Aportes líquidos',U.fc(r.aportesLiq),'aportes − resgates','k-gold')+
    kpiHtml('Sobra de caixa após aportes',U.fc(r.sobra),'receitas − despesas − aportes líq.',r.sobra>=0?'k-pos':'k-neg')+
    kpiHtml('Patrimônio financeiro',U.fc0(r.patrFin),'ativos líquidos','k-gold')+
    kpiHtml('Patrimônio total',U.fc0(r.patrTotal),'financeiro + bens','k-dark')+
    '</div>'+
    (alertas.length?'<div class="note warn"><strong>Alertas:</strong><br>'+alertas.join('<br>')+'</div>':'')+
    '<div class="btn-row">'+(IS_SNAPSHOT?'':'<button class="btn small" id="atReceita">+ Receita</button><button class="btn small" id="atDespesa">+ Despesa</button><button class="btn small" id="atAporte">+ Aporte</button>')+'</div>'+
    '<div class="sec-title"><span class="sec-num">02</span> Últimos 12 meses</div>'+
    chartCard('chResumo12','Receitas × Despesas × Resultado')+
    '<div class="sec-title"><span class="sec-num">03</span> Metas em andamento</div>'+
    (metas.length?metas.map(m=>{
      const p=FIN.metaProgresso(S,m,UI.mk);
      const pct=p.pct==null?0:U.clamp(p.pct,0,140);
      const cls=p.status==='ok'?'':(p.status==='warn'?'warn':'bad');
      return '<div class="rowcard"><div class="rc-top"><span class="sem '+(p.status==='ok'?'g':p.status==='warn'?'y':'r')+'"></span>'+
        '<span class="rc-desc">'+U.esc(m.nome)+'</span><span class="rc-val">'+U.fc0(p.realizado)+' <span class="muted">/ '+U.fc0(p.alvo)+'</span></span></div>'+
        '<div class="prog" style="margin-top:8px;"><i class="'+cls+'" style="width:'+U.clamp(pct,0,100)+'%;"></i></div>'+
        '<div class="muted" style="margin-top:4px;">'+(p.pct==null?'defina o valor-alvo':U.fpct(p.pct,0)+' '+(p.invertida?'do limite usado':'da meta atingida'))+'</div></div>';
    }).join(''):'<div class="empty-state">Nenhuma meta ativa — crie na aba Orçamento.</div>');
  CH.line(document.getElementById('chResumo12'),[

  CH.legenda(document.getElementById('chResumo12Leg'),

  tabelaDados('chResumo12',['Mês','Receitas','Despesas','Resultado'],mks.map((k,i)=>[U.mkLabel(k),recS[i],despS[i],resS[i]]));

    document.getElementById('atReceita')?.addEventListener('click',()=>modalRow(null,'receita'));

  }
}

/* ═══════════════════════════════════════════════════════════════
   14 · ABA LANÇAMENTOS
═══════════════════════════════════════════════════════════════ */
function rowsFiltradas(){
  const f=UI.filtros;
  let list=S.rows.filter(r=>r.natureza===UI.natSeg);
  if(f.texto)list=list.filter(r=>(r.descricao+' '+r.categoria+' '+r.subcategoria+' '+(r.obs||'')).toLowerCase().includes(f.texto.toLowerCase()));
  if(f.categoria)list=list.filter(r=>r.categoria===f.categoria);
  if(f.pessoa)list=list.filter(r=>r.pessoa===f.pessoa);
  if(f.conta)list=list.filter(r=>r.conta===f.conta);
  if(f.tag)list=list.filter(r=>(r.tags||[]).includes(f.tag));
  const mkAno=m=>U.mk(UI.anoGrid,m);
  const totalAno=r=>{let t=0;for(let m=1;m<=12;m++)t+=FIN.valorMes(r,mkAno(m),UI.modoValor);return t;};
  if(f.ordem==='valor')list.sort((a,b)=>totalAno(b)-totalAno(a));
  else if(f.ordem==='categoria')list.sort((a,b)=>(a.categoria||'').localeCompare(b.categoria||'')||a.descricao.localeCompare(b.descricao));
  else list.sort((a,b)=>a.descricao.localeCompare(b.descricao));
  return list;
}
function rLanc(el){
  const nat=UI.natSeg,ano=UI.anoGrid;
  const list=rowsFiltradas();
  const ativas=list.filter(r=>r.ativo),arquivadas=list.filter(r=>!r.ativo);
  const cats=['',...catsDe(nat).map(c=>c.n)];

    '<div class="seg" style="max-width:340px;margin-bottom:10px;">'+

    '<button class="seg-btn '+(nat==='despesa'?'active':'')+'" data-nat="despesa">Despesas</button></div>'+
    '<div class="seg" style="max-width:340px;margin-bottom:10px;">'+
    '<button class="seg-btn '+(UI.modoValor==='r'?'active':'')+'" data-mv="r">Realizado</button>'+
    '<button class="seg-btn '+(UI.modoValor==='p'?'active':'')+'" data-mv="p">Previsto</button></div>'+
    '<div class="filter-bar">'+
    '<div class="f-wrap"><input class="f-input" id="fTexto" style="text-align:left;" placeholder="buscar…" value="'+U.esc(UI.filtros.texto)+'" aria-label="Buscar lançamento"></div>'+
    '<div class="f-wrap"><select class="f-select" id="fCat" aria-label="Filtrar por categoria">'+cats.map(c=>'<option value="'+U.esc(c)+'"'+(c===UI.filtros.categoria?' selected':'')+'>'+(c||'todas categorias')+'</option>').join('')+'</select></div>'+
    '<div class="f-wrap"><select class="f-select" id="fOrd" aria-label="Ordenar">'+[['descricao','ordem: descrição'],['categoria','ordem: categoria'],['valor','ordem: maior valor']].map(([v,t])=>'<option value="'+v+'"'+(v===UI.filtros.ordem?' selected':'')+'>'+t+'</option>').join('')+'</select></div>'+
    '</div>'+
    '<div id="lancList"></div>'+
    (arquivadas.length?'<div class="sec-title">Arquivadas</div><div id="lancArq"></div>':'');
  const cont=document.getElementById('lancList');
  if(!ativas.length)cont.innerHTML='<div class="empty-state">Nenhum lançamento de '+(nat==='receita'?'receita':'despesa')+' — toque em + para adicionar.</div>';

  el.querySelectorAll('[data-mv]').forEach(b=>b.addEventListener('click',()=>{UI.modoValor=b.dataset.mv;rLanc(el);}));

  document.getElementById('anoNext').addEventListener('click',()=>{UI.anoGrid++;rLanc(el);});
  document.getElementById('fTexto').addEventListener('input',e=>{UI.filtros.texto=e.target.value;clearTimeout(el._ft);el._ft=setTimeout(()=>rLanc(el),350);});
  document.getElementById('fCat').addEventListener('change',e=>{UI.filtros.categoria=e.target.value;rLanc(el);});
  document.getElementById('fOrd').addEventListener('change',e=>{UI.filtros.ordem=e.target.value;rLanc(el);});
  document.getElementById('btnUndo')?.addEventListener('click',desfazer);
  document.getElementById('btnFechar')?.addEventListener('click',()=>{
    const fechado=S.fechados.includes(UI.mk);
    confirmar(fechado?'Reabrir o mês de '+U.mkLabelFull(UI.mk)+' para edição?':'Fechar o mês de '+U.mkLabelFull(UI.mk)+'? Os valores desse mês ficarão bloqueados até a reabertura.',
      ()=>mudar(()=>{if(fechado)S.fechados=S.fechados.filter(k=>k!==UI.mk);else S.fechados.push(UI.mk);}),fechado?'Reabrir':'Fechar mês');

function cardRow(r){
  const div=document.createElement('div');
  div.className='rowcard'+(r.ativo?'':' inactive');
  const mkCur=UI.mk;
  let mm='';
  for(let m=1;m<=12;m++){
    const mk=U.mk(UI.anoGrid,m),v=FIN.valorMes(r,mk,UI.modoValor);
    const locked=S.fechados.includes(mk);
    mm+='<button class="rc-m'+(v?'':' zero')+(mk===mkCur?' cur':'')+(locked?' locked':'')+'" data-mes="'+mk+'" aria-label="Editar '+MESES_NOME[m-1]+'">'+
      '<span class="mlbl">'+MESES_ABREV[m-1]+'</span><span class="mval">'+(v?U.fcK(v):'—')+'</span></button>';
  }
  let tot=0;for(let m=1;m<=12;m++)tot+=FIN.valorMes(r,U.mk(UI.anoGrid,m),UI.modoValor);
  div.innerHTML='<div class="rc-top"><span class="rc-desc">'+U.esc(r.descricao)+'</span>'+
    '<span class="rc-cat">'+U.esc(r.categoria)+(r.subcategoria?' · '+U.esc(r.subcategoria):'')+(r.pessoa?' · '+U.esc(r.pessoa):'')+'</span>'+
    '<span class="rc-val '+(r.natureza==='receita'?'c-sage':'c-rust')+'">'+U.fc0(tot)+'<span class="muted">/ano</span></span></div>'+
    '<div class="rc-months">'+mm+'</div>'+
    '<div class="rc-actions">'+(IS_SNAPSHOT?'':
    '<button class="mini" data-a="editar">editar</button><button class="mini" data-a="meses">valores do ano</button>'+
    '<button class="mini" data-a="duplicar">duplicar</button><button class="mini" data-a="arquivar">'+(r.ativo?'arquivar':'reativar')+'</button>'+
    '<button class="mini danger" data-a="excluir">excluir</button>')+'</div>';
  div.querySelectorAll('[data-mes]').forEach(b=>b.addEventListener('click',()=>modalMes(r,b.dataset.mes)));
  div.querySelectorAll('[data-a]').forEach(b=>b.addEventListener('click',()=>acaoRow(r,b.dataset.a)));

function acaoRow(r,a){
  if(a==='editar')modalRow(r);
  else if(a==='meses')modalMeses(r);
  else if(a==='duplicar')mudar(()=>{const c=U.deep(r);c.id=U.uid();c.descricao=r.descricao+' (cópia)';S.rows.push(c);});
  else if(a==='arquivar')mudar(()=>{r.ativo=!r.ativo;});
  else if(a==='excluir')confirmar('Excluir definitivamente <strong>'+U.esc(r.descricao)+'</strong> e todo o seu histórico? Esta ação não pode ser desfeita depois de fechar a aplicação.',()=>mudar(()=>{S.rows=S.rows.filter(x=>x.id!==r.id);}),'Excluir');
}
function gradeAnual(list){
  const wrap=document.createElement('div');wrap.className='gridwrap';
  const mkAno=m=>U.mk(UI.anoGrid,m);
  let head='<tr><th>Descrição</th>';
  for(let m=1;m<=12;m++)head+='<th>'+MESES_ABREV[m-1]+'</th>';
  head+='<th>Total</th><th>Média</th><th></th></tr>';
  let body='';
  const totCol=new Array(13).fill(0);
  list.forEach(r=>{
    let tot=0;
    let tds='';
    for(let m=1;m<=12;m++){
      const mk=mkAno(m),v=FIN.valorMes(r,mk,UI.modoValor);
      tot+=v;totCol[m-1]+=v;
      const locked=S.fechados.includes(mk)||IS_SNAPSHOT;
      tds+='<td><input value="'+(v?U.ic(v):'')+'" data-rid="'+r.id+'" data-mk="'+mk+'" '+(locked?'disabled':'')+' aria-label="'+U.esc(r.descricao)+' '+U.mkLabel(mk)+'"></td>';
    }
    totCol[12]+=tot;
    body+='<tr><td title="'+U.esc(r.descricao)+'">'+U.esc(r.descricao)+'<div class="muted">'+U.esc(r.categoria)+'</div></td>'+tds+
      '<td class="tot">'+U.fc0(tot)+'</td><td>'+U.fc0(Math.round(tot/12))+'</td>'+
      '<td>'+(IS_SNAPSHOT?'':'<button class="mini" data-ed="'+r.id+'" aria-label="Editar linha">✎</button>')+'</td></tr>';
  });
  let sum='<tr class="sumrow"><td>Total</td>';
  for(let m=0;m<12;m++)sum+='<td class="tot">'+U.fc0(totCol[m])+'</td>';
  sum+='<td class="tot">'+U.fc0(totCol[12])+'</td><td>'+U.fc0(Math.round(totCol[12]/12))+'</td><td></td></tr>';
  wrap.innerHTML='<table class="grid"><thead>'+head+'</thead><tbody>'+body+sum+'</tbody></table>';
  wrap.querySelectorAll('input[data-rid]').forEach(inp=>{
    inp.addEventListener('change',()=>{
      const row=S.rows.find(x=>x.id===inp.dataset.rid);
      if(!row)return;
      const c=inp.value.trim()===''?null:U.pc(inp.value);
      if(inp.value.trim()!==''&&c==null){toast('Valor inválido: '+inp.value,true);inp.focus();return;}
      if(c!=null&&c<0){toast('Use estorno/receita em vez de valor negativo',true);}
      mudar(()=>{
        if(!row.meses[inp.dataset.mk])row.meses[inp.dataset.mk]={p:null,r:null};
        row.meses[inp.dataset.mk][UI.modoValor]=c;
      });
    });
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();});
  });
  wrap.querySelectorAll('[data-ed]').forEach(b=>b.addEventListener('click',()=>{
    const row=S.rows.find(x=>x.id===b.dataset.ed);if(row)modalRow(row);
  }));
  return wrap;
}
/* modal: cadastro/edição de linha */

    '<div class="f-grid">'+
    fText('mDesc','Descrição *',row?.descricao||'')+
    fSel('mCat','Categoria',cats.map(c=>c.n),catSel)+
    fSel('mSub','Subcategoria',['',...subs],row?.subcategoria||'')+
    (nat==='despesa'?fSel('mClassif','Classificação',CLASSIF_DESP,row?.classificacao||'fixa'):'')+

    fSel('mPessoa','Pessoa / origem',['',...S.config.pessoas],row?.pessoa||'')+
    fSel('mConta','Conta / cartão',['',...S.config.contas],row?.conta||'')+
    (nat==='despesa'?fText('mForma','Forma de pagamento',row?.formaPagamento||''):'')+
    fText('mTags','Tags (separadas por vírgula)',(row?.tags||[]).join(', '))+
    '</div>'+
    (nat==='despesa'?'<div style="margin-top:10px;">'+fCheck('mEss','Despesa essencial',row?row.essencial:true)+'</div>':'')+
    '<div class="field" style="margin-top:10px;"><label class="f-label" for="mObs">Observações</label><div class="f-wrap"><textarea class="f-area" id="mObs">'+U.esc(row?.obs||'')+'</textarea></div></div>'+
    (isNew?'<div class="f-grid" style="margin-top:10px;">'+fMoney('mValP','Previsto mensal (opcional)',null)+fMoney('mValR','Realizado em '+U.mkLabel(UI.mk)+' (opcional)',null)+'</div><span class="f-hint">O previsto será aplicado de '+U.mkLabel(UI.mk)+' até dezembro/'+UI.anoGrid+'. Depois ajuste mês a mês.</span>':''),
    [{label:'Cancelar',fn:closeSheet},{label:isNew?'Adicionar':'Salvar',cls:'primary',fn:()=>{
      const desc=vTxt('mDesc');
      if(!desc){toast('Informe a descrição',true);return;}
      const dados={descricao:desc,categoria:vSel('mCat'),subcategoria:vSel('mSub'),
        recorrencia:vSel('mRec'),pessoa:vSel('mPessoa'),conta:vSel('mConta'),
        tags:vTxt('mTags')?vTxt('mTags').split(',').map(s=>s.trim()).filter(Boolean):[],obs:vTxt('mObs')};
      if(nat==='despesa'){dados.classificacao=vSel('mClassif');dados.essencial=vChk('mEss');dados.formaPagamento=vTxt('mForma');}
      closeSheet();
      mudar(()=>{
        if(isNew){
          const r={id:U.uid(),natureza:nat,essencial:false,classificacao:'',formaPagamento:'',ativo:true,meses:{}};
          Object.assign(r,dados);
          const p=vMoney('mValP'),rl=vMoney('mValR');
          if(p!=null){const {m}=U.mkParse(UI.mk);for(let mm=m;mm<=12;mm++)r.meses[U.mk(UI.anoGrid,mm)]={p,r:null};}
          if(rl!=null){if(!r.meses[UI.mk])r.meses[UI.mk]={p:null,r:null};r.meses[UI.mk].r=rl;}
          S.rows.push(r);
        }else Object.assign(row,dados);

  document.getElementById('mCat').addEventListener('change',e=>{
